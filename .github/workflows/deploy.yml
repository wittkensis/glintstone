name: deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target:
        description: Which environment to deploy
        required: true
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # The pre-deploy pg_dump of the ~19 GB prod DB alone runs ~18–20 min and
    # grows with the data. The old 25-min cap left almost no margin over a
    # 22–23-min happy-path deploy, so a slightly-slower-than-usual dump looked
    # like a hang and got cancelled (2026-06-21 incident). 40 min gives real
    # headroom; deploy.sh now bounds every long remote step with its own faster
    # `timeout`, so a genuine stall still fails fast well inside this ceiling
    # rather than silently riding it out.
    timeout-minutes: 40
    environment:
      name: >-
        ${{ github.ref == 'refs/heads/main' &&
            github.actor == 'wittkensis' && 'production-auto' ||
            github.ref == 'refs/heads/main' && 'production' ||
            'staging' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_env=production" >> "$GITHUB_OUTPUT"
            echo "release_tag=prod-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "app_env=staging" >> "$GITHUB_OUTPUT"
            echo "release_tag=staging-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build deps
        run: pip install --quiet markdown PyYAML

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::HOSTINGER_HOST secret is empty"; exit 1
          fi
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::HOSTINGER_SSH_KEY secret is empty"; exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # ssh-keyscan from GitHub Actions runners flakes intermittently (a
          # single timed-out scan was failing the whole deploy — 2026-06-21
          # incident #266/#7). Two layers of defence:
          #
          #   1. Retry the keyscan up to 5× with exponential backoff (5/10/20/
          #      40s). A transient timeout no longer kills the deploy.
          #   2. If all retries still fail, DON'T abort: deploy.sh connects with
          #      `StrictHostKeyChecking=accept-new`, which adds the host key on
          #      first contact anyway. A failed keyscan only means we couldn't
          #      PRE-seed known_hosts; it does not mean the VPS is unreachable.
          #      The real reachability check is the deploy SSH itself, which now
          #      fails fast (ConnectTimeout/BatchMode) with a clear error.
          keyscan_ok=false
          KEYSCAN_ATTEMPTS="${KEYSCAN_ATTEMPTS:-5}"
          keyscan_backoff=5
          for attempt in $(seq 1 "$KEYSCAN_ATTEMPTS"); do
            if ssh-keyscan -T 10 -t rsa,ecdsa,ed25519 -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/tmp/keyscan.err; then
              echo "ssh-keyscan succeeded on attempt $attempt"
              keyscan_ok=true
              break
            fi
            if [ "$attempt" -ge "$KEYSCAN_ATTEMPTS" ]; then
              break
            fi
            echo "::warning::ssh-keyscan attempt $attempt/$KEYSCAN_ATTEMPTS failed against $SSH_HOST; retrying in ${keyscan_backoff}s"
            cat /tmp/keyscan.err || true
            sleep "$keyscan_backoff"
            keyscan_backoff=$((keyscan_backoff * 2))   # exponential backoff: 5s, 10s, 20s, 40s
          done
          if [ "$keyscan_ok" != true ]; then
            echo "::warning::ssh-keyscan never succeeded after 5 attempts (last error below)."
            echo "::warning::Proceeding anyway — deploy.sh uses StrictHostKeyChecking=accept-new."
            cat /tmp/keyscan.err || true
          fi
          chmod 600 ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Hostinger
        env:
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_USER: deploy
          RELEASE_TAG: ${{ steps.env.outputs.release_tag }}
          APP_ENV: ${{ steps.env.outputs.app_env }}
          SSH_KEY_PATH: ~/.ssh/deploy_key
        run: |
          set -uo pipefail

          # --- Workflow-level connect retry (#437) ---------------------------
          # The GitHub-hosted-runner → Hostinger VPS TCP connect to port 22
          # flakes intermittently (a SYN times out before the session is
          # established — ~every other deploy needed a manual `gh run rerun
          # --failed`). deploy.sh already retries its OWN ssh/rsync legs, but
          # that wrapper only helps AFTER the first connection succeeds; when
          # the very first reachability is the thing flaking, the early phase
          # can still fall over before deploy.sh's per-leg retry earns its keep.
          # Diagnosed 2026-06-24: the VPS runs NO ufw / nftables / iptables /
          # fail2ban (verified as root), so the runner IPs are NOT being banned
          # or rate-limited — this is transient network-path variance on the
          # GitHub egress side, the textbook case for a retry.
          #
          # IDEMPOTENT-SAFE: RELEASE_TAG is fixed once (in "Set environment"),
          # so every attempt targets the SAME release dir. deploy.sh is
          # re-entrant for a same-tag re-run — rsync --delete re-syncs cleanly,
          # `python -m venv` over an existing venv is a no-op, the pre-deploy
          # pg_dump `rm -rf`s any partial dir before re-dumping, migrations are
          # tracked in the `_migrations` table so already-applied ones skip, and
          # the symlink swap (ln -sfn / mv -Tf) is idempotent.
          #
          # CONNECT-PHASE GATING: we never blindly re-run deploy.sh. Before each
          # attempt a fast TCP probe confirms port 22 is reachable; the retry
          # path is ONLY taken when a probe FAILED (i.e. a genuine connect
          # timeout). Once the probe succeeds, deploy.sh runs exactly once and
          # its real exit code propagates unretried — so a migration/command
          # failure inside deploy.sh is NEVER re-run.
          ATTEMPTS="${DEPLOY_CONNECT_ATTEMPTS:-5}"
          PROBE_TIMEOUT="${DEPLOY_PROBE_TIMEOUT:-15}"
          BACKOFF="${DEPLOY_CONNECT_BACKOFF:-15}"

          # WHY AN SSH PROBE, NOT A BARE TCP PROBE (#804 sharpening):
          # The earlier gate opened a raw /dev/tcp socket to :22 and treated
          # that as "reachable". But the failure we actually see (~8×) is the
          # runner→VPS *SSH* connect timing out — the TCP SYN/ACK can land while
          # the SSH transport handshake (KEX + auth) still stalls and ssh exits
          # 255 BEFORE deploy.sh's first `ssh_run` gets a fair shot. A bare TCP
          # probe passes in that window, so the old gate could fall straight
          # into deploy.sh on a connection that then dies — leaning entirely on
          # deploy.sh's per-leg retry, which is exactly the layer the ticket
          # says doesn't cover the *initial* connect. So the gate now performs a
          # real, cheap SSH session (`true`) with the deploy key and the same
          # ConnectTimeout/BatchMode ssh already uses in deploy.sh. Only a
          # genuinely usable SSH connection — TCP + KEX + key auth — lets us
          # past the gate. Any 255 (connect OR auth flake) is retried here at
          # the WORKFLOW step level with exponential backoff.
          probe_vps() {
            # Returns 0 only if a full SSH session establishes AND authenticates
            # within PROBE_TIMEOUT. `true` is a no-op remote command, so this
            # never mutates the VPS — it is a pure reachability check.
            timeout "$PROBE_TIMEOUT" \
              ssh -o StrictHostKeyChecking=accept-new \
                  -o UserKnownHostsFile=~/.ssh/known_hosts \
                  -o BatchMode=yes \
                  -o ConnectTimeout="$PROBE_TIMEOUT" \
                  -i "$HOME/.ssh/deploy_key" \
                  "${DEPLOY_USER}@${DEPLOY_HOST}" true 2>/tmp/ssh_probe.err
          }

          attempt=1
          while :; do
            if probe_vps; then
              echo "::notice::VPS SSH reachable (attempt $attempt/$ATTEMPTS) — running deploy.sh"
              # SSH probe OK: the connection that was flaking is now proven
              # good. Run the deploy and propagate its true exit code. No retry
              # past this point — deploy.sh owns the result, so a migration or
              # command failure inside it is NEVER blindly re-run.
              bash ops/deploy/deploy.sh
              exit $?
            fi

            # SSH probe failed = transient connect/auth timeout (exit 255 class).
            # Retry the PROBE only; deploy.sh has not run.
            if [ "$attempt" -ge "$ATTEMPTS" ]; then
              echo "::error::VPS SSH unreachable after $ATTEMPTS connect attempts."
              echo "::error::This is a transient runner→VPS SSH-connect timeout, not a"
              echo "::error::VPS-side block (no firewall/fail2ban present). Last error:"
              cat /tmp/ssh_probe.err || true
              echo "::error::Re-run the job."
              exit 1
            fi
            echo "::warning::VPS SSH connect probe failed (attempt $attempt/$ATTEMPTS) — retrying in ${BACKOFF}s..."
            cat /tmp/ssh_probe.err || true
            sleep "$BACKOFF"
            attempt=$((attempt + 1))
            BACKOFF=$((BACKOFF * 2))   # exponential backoff: 15s, 30s, 60s, ...
          done
