name: deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target:
        description: Which environment to deploy
        required: true
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_env=production" >> "$GITHUB_OUTPUT"
            echo "release_tag=prod-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "app_env=staging" >> "$GITHUB_OUTPUT"
            echo "release_tag=staging-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # deploy.sh runs `python ops/build_docs.py` on the GHA runner (the docs
      # site is built here, then rsynced to the server). That script needs
      # markdown + PyYAML — install them before the deploy step.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build deps
        run: pip install --quiet markdown PyYAML

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::HOSTINGER_HOST secret is empty"; exit 1
          fi
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::HOSTINGER_SSH_KEY secret is empty"; exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # No 2>/dev/null — if VPS is unreachable we want the exact error,
          # not a silent exit-1 like the deploy on 2026-05-12 at 14:52 UTC.
          if ! ssh-keyscan -T 8 -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan failed against $SSH_HOST — VPS may be unreachable from GitHub Actions"
            exit 1
          fi

      - name: Deploy to Hostinger
        env:
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_USER: deploy
          RELEASE_TAG: ${{ steps.env.outputs.release_tag }}
          APP_ENV: ${{ steps.env.outputs.app_env }}
          SSH_KEY_PATH: ~/.ssh/deploy_key
        run: |
          bash ops/deploy/deploy.sh
