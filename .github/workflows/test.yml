name: tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin ruff to keep CI deterministic — bump deliberately alongside the
          # pre-commit hook pin in .pre-commit-config.yaml so local + CI agree.
          pip install pytest pytest-asyncio "ruff==0.15.2" mypy pip-audit

      - name: Dependency audit (pip-audit)
        # Non-blocking: surfaces CVEs without gating CI until the fix lands.
        # Flip to required once the backlog is clear. See issue #52.
        continue-on-error: true
        run: |
          pip-audit --strict --progress-spinner off

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        # Non-blocking: the codebase has no prior type-checking discipline, so
        # mypy reports rather than gates. Flip to required once the backlog is
        # cleared (see issue #83 phase 3a).
        continue-on-error: true
        run: |
          mypy api/ app/ core/ mcp/ --ignore-missing-imports

      - name: Run pytest
        # Integration tests (those depending on `has_database_url`) are skipped
        # in CI: production Postgres is now on the VPS and not reachable from
        # GitHub Actions. Unit tests still run. To run integration tests in CI,
        # provision a Postgres service in this job or expose the VPS DB via a
        # tunnel.
        run: |
          python -m pytest tests/ -v --tb=short
