name: tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin ruff to keep CI deterministic — bump deliberately alongside the
          # pre-commit hook pin in .pre-commit-config.yaml so local + CI agree.
          pip install pytest pytest-asyncio "ruff==0.15.2" mypy pip-audit

      - name: Dependency audit (pip-audit)
        # Blocking: a new CVE in a shipped dependency fails CI (audit finding 3a).
        # The five ignored advisories are all in `pip` itself — the build tool,
        # not a runtime/shipped dependency — and this job upgrades pip to the
        # latest release at install time anyway. There are zero outstanding CVEs
        # in requirements.txt. Re-audit and drop ignores once the runner image
        # ships a pip past these advisories.
        #   PYSEC-2026-196 / CVE-2026-1703 / CVE-2026-3219 / CVE-2026-6357 / CVE-2025-8869 — pip
        run: |
          pip-audit --strict --progress-spinner off \
            --ignore-vuln PYSEC-2026-196 \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-6357

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        # Blocking: the codebase is now clean under mypy across these packages
        # (audit finding 3a). New type errors fail CI.
        run: |
          mypy api/ app/ core/ mcp/ --ignore-missing-imports

      - name: Run pytest
        # Integration tests (those depending on `has_database_url`) are skipped
        # in CI: production Postgres is now on the VPS and not reachable from
        # GitHub Actions. Unit tests still run. To run integration tests in CI,
        # provision a Postgres service in this job or expose the VPS DB via a
        # tunnel.
        run: |
          python -m pytest tests/ -v --tb=short
