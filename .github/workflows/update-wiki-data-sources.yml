name: Update Wiki — Data Sources

on:
  workflow_dispatch:

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out main repo (wiki source files)
        uses: actions/checkout@v4
        with:
          path: main

      - name: Check out wiki repo
        uses: actions/checkout@v4
        with:
          repository: wittkensis/glintstone.wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          path: wiki

      - name: Copy updated page into wiki
        run: cp main/.github/wiki/Data-Model-Data-Sources.md wiki/Data-Model-Data-Sources.md

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data-Model-Data-Sources.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Rewrite Data Sources page — concise tables over prose deep-dives"
          git push
