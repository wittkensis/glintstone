    usefulness: [domain-rich, regression-test]
    as_of: 2026-05-11

  - id: oracc/rinap
    label: ORACC RINAP project import
    why: Demonstrates project-scoped annotation runs from ORACC.
    usefulness: [onboarding-demo]
    as_of: 2026-05-11
