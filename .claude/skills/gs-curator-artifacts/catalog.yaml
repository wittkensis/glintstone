# Glintstone curated records catalog.
#
# This file is the single source of truth for "give me a representative record" requests.
# Mirrored into tests/fixtures/fixtures.py for the test suite to reference by name.
#
# Schema:
#   <entity_type>:
#     - id: <natural key — P-number, entry_id, sign_id, …>
#       label: short human description
#       why: one sentence on why this one matters
#       usefulness: [onboarding-demo | regression-test | edge-case | performance-test | ux-stress | domain-rich]
#       as_of: YYYY-MM-DD
#       sources: [list of data sources that contributed]
#       notes: optional extra context
#
# When adding a new entry:
#   1. Run gs-curator-artifacts/discovery-queries.md to find good candidates
#   2. Add here with today's as_of
#   3. Add a constant to tests/fixtures/fixtures.py
#   4. Bump the file header's modified date below

_meta:
  modified: 2026-05-11
  question: "Which representative records demonstrate each interesting scenario?"
  context: "Initial catalog seeded from PLAN/Translation Pipeline UI examples (P227657, P247526, P229672) plus picks from the 5-layer schema. Extend eagerly."

artifacts:
  - id: P227657
    label: KTT 188 — Sumerian lexical text
    why: Simple Old Babylonian word list. 265 lines, 259 translations, perfect 1:1 alignment. The "onboarding tablet".
    usefulness: [onboarding-demo, ux-stress]
    as_of: 2026-05-11
    sources: [cdli]

  - id: P247526
    label: BM 103142 — Ur III Sumerian lexical
    why: Compound terms, broken lines, simpler-than-it-looks edge cases. 169 lines, 151 translations.
    usefulness: [edge-case, regression-test]
    as_of: 2026-05-11
    sources: [cdli]

  - id: P229672
    label: K 03254 + K 03779 — Neo-Assyrian joined fragments
    why: Composite linkage, joined fragments parsed from `+` in designation, structural ATF markers, complex surface data.
    usefulness: [edge-case, ux-stress, domain-rich]
    as_of: 2026-05-11
    sources: [cdli, oracc]

  - id: P001282
    label: Bilingual tablet with ORACC lemmatization
    why: Demonstrates per-word language column post migration 011. Sumerian-Akkadian bilingual.
    usefulness: [regression-test, domain-rich]
    as_of: 2026-05-11
    sources: [cdli, oracc]
    notes: Add after verifying — referenced in PLAN/PRIVATE-TODO.md but verify against Neon.

