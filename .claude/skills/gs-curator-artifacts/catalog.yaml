lemmas:
  - id: "epsd2/lugal"
    label: Sumerian "king" — high polysemy + high attestation
    why: 20+ senses, 2000+ attestations, written with one sign (LUGAL). Classic.
    usefulness: [onboarding-demo, domain-rich]
    as_of: 2026-05-11
    sources: [epsd2]

  - id: "oracc/saao/šarru"
    label: Akkadian "king" — Sumerogram-backed
    why: Demonstrates Sumerogram pattern (Akkadian word written with Sumerian sign LUGAL).
    usefulness: [domain-rich, edge-case]
    as_of: 2026-05-11
    sources: [oracc]

  - id: "epsd2/ninda"
    label: Sumerian "bread, food" — top attestation
    why: 109,427 attestations. The most-frequent lemma. Tests the critical-cache hot path.
    usefulness: [performance-test, onboarding-demo]
    as_of: 2026-05-11
    sources: [epsd2]

signs:
  - id: KA
    label: KA sign — high polyvalency
    why: Reads as ka, gu, dug, inim, zu. Used as Sumerogram for Akkadian pû "mouth". The polyvalency teaching example.
    usefulness: [onboarding-demo, domain-rich]
    as_of: 2026-05-11
    sources: [ogsl]

  - id: TBD
    label: Sign with no Unicode mapping
    why: Tests the ~200-400 signs that need manual MZL/OGSL curation. Exposes UI fallback for missing codepoints.
    usefulness: [edge-case]
    as_of: 2026-05-11
    notes: Pick via SELECT FROM signs WHERE unicode IS NULL ORDER BY attestation_count DESC LIMIT 1.

periods:
  - id: "Ur III"
    label: Third Dynasty of Ur (~2112-2004 BCE)
    why: One of the best-attested periods. Lots of administrative texts. Good for filter testing.
    usefulness: [onboarding-demo]
    as_of: 2026-05-11

  - id: "Neo-Assyrian"
    label: Neo-Assyrian (~911-612 BCE)
    why: Royal inscriptions, RINAP corpus. Different genre balance from Ur III. Good for cross-filter testing.
    usefulness: [regression-test]
    as_of: 2026-05-11

proveniences:
  - id: "Nippur"
    label: Nippur (mod. Nuffar)
    why: Major site, well-represented in CDLI catalog. Tests provenience canonicalization.
    usefulness: [onboarding-demo]
    as_of: 2026-05-11

  - id: "Tello"
    label: Tello (anc. Girsu)
    why: Tests the canonicalization rule "Tello (anc. Girsu)" → "Girsu" (or vice versa, depending on canon).
    usefulness: [regression-test]
    as_of: 2026-05-11

genres:
  - id: "Lexical"
    label: Lexical lists
    why: Sumerian-style word lists. Simpler structure; good for ATF-viewer testing.
    usefulness: [onboarding-demo]
    as_of: 2026-05-11

  - id: "Royal inscription"
    label: Royal inscriptions
    why: Rich content, multilingual, RINAP-heavy. Stresses translation pipeline.
    usefulness: [ux-stress]
    as_of: 2026-05-11

search_terms:
  - term: lugal
    label: 'lugal — Sumerian for king'
    why: Single token, multiple lemmas (Sumerian + as Sumerogram in Akkadian). Tests cross-language search.
    usefulness: [onboarding-demo, regression-test]
    as_of: 2026-05-11

  - term: ninda kasz
    label: 'bigram — bread, beer'
    why: Frequent co-occurrence in lexical lists. Tests phrase / multi-token search.
    usefulness: [edge-case]
    as_of: 2026-05-11

  - term: "𒈗"
    label: Cuneiform LUGAL (U+12157)
    why: Unicode input. Tests the input box accepting actual cuneiform glyphs.
    usefulness: [ux-stress]
    as_of: 2026-05-11

composites:
  - id: TBD
    label: Composite text with many exemplars
    why: Tests the P → Q linkage UI and the exemplar comparison view.
    usefulness: [onboarding-demo, ux-stress]
    as_of: 2026-05-11
    notes: Pick from artifact_composites — top Q-number by exemplar count.

annotation_runs:
