<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translation Builder v4 · KUB 99.1 + KBo 50.999</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111;--bg-p:#161616;--bg-el:#1e1e1e;--bg-deep:#131313;--bg-in:#0a0a0a;
  --bd:#272727;--bd2:#333;
  --ac:#c9a962;--ac-dim:rgba(201,169,98,.10);
  --tx:#e8e6e3;--tx2:#888;--tx3:#505050;--red:#e23838;
  --sux:#6b8e6b;--sux-b:rgba(107,142,107,.08);
  --akk:#8ab4d4;--akk-b:rgba(138,180,212,.08);
  --hit:#c4956a;--hit-b:rgba(196,149,106,.08);
  --elx:#b48ad4;--elx-b:rgba(180,138,212,.08);
  --uga:#d4908a;--uga-b:rgba(212,144,138,.08);
  --egy:#c8c06a;--egy-b:rgba(200,192,106,.08);
  --mono:'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
  --ui:'Inter',system-ui,sans-serif;
  --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--ui);font-size:13px;line-height:1.4;overflow:hidden;}
.app{display:grid;grid-template-rows:40px 40px 30px 1fr;height:100vh;overflow:hidden;}

/* ── TOOLBAR ── */
.toolbar{background:var(--bg-el);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;padding:0 12px;z-index:10;overflow-x:auto;}
.tb-sep{width:1px;height:16px;background:var(--bd);flex-shrink:0;}
.tb-grp{display:flex;border-radius:4px;overflow:hidden;border:1px solid var(--bd);flex-shrink:0;}
.tb-btn{background:transparent;border:none;padding:4px 10px;font:500 10px/1 var(--ui);color:var(--tx3);cursor:pointer;transition:all .1s;white-space:nowrap;}
.tb-btn:hover{color:var(--tx2);}
.tb-btn.on{background:var(--ac);color:#111;font-weight:600;}
.tb-sel{background:transparent;border:1px solid var(--bd);border-radius:4px;padding:4px 8px;color:var(--tx2);font:400 10px/1 var(--ui);cursor:pointer;flex-shrink:0;}
.pipe-nav{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.pnl{font:500 8px/1 var(--ui);text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-right:2px;}
.s-btn{background:transparent;border:1px solid var(--bd);border-radius:3px;padding:3px 5px;font:500 9px/1 var(--mono);color:var(--tx3);cursor:pointer;transition:all .1s;white-space:nowrap;}
.s-btn:hover{border-color:var(--ac);color:var(--ac);}
.s-btn.filtered{background:var(--ac);color:#111;border-color:var(--ac);}
.hl-lbl{display:flex;align-items:center;gap:5px;cursor:pointer;margin-left:auto;flex-shrink:0;}
.hl-lbl input{display:none;}
.hl-tr{width:28px;height:14px;background:#333;border-radius:7px;position:relative;transition:background .15s;}
.hl-tr::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;background:#888;border-radius:5px;transition:all .15s;}
.hl-lbl input:checked+.hl-tr{background:rgba(201,169,98,.3);}
.hl-lbl input:checked+.hl-tr::after{left:16px;background:var(--ac);}
.hl-txt{font:400 9px/1 var(--ui);color:var(--tx3);}

/* ── TABLET HEADER (slim) ── */
.th{background:var(--bg-p);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;}
.th-name{font:500 12px/1 var(--mono);color:var(--tx);white-space:nowrap;}
.chip{font:400 9px/1 var(--ui);padding:1px 5px;border-radius:3px;border:1px solid var(--bd);color:var(--tx3);white-space:nowrap;}
.chip-j{color:var(--ac);border-color:rgba(201,169,98,.2);}
/* Language legend */
.legend{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.legend-item{display:flex;align-items:center;gap:3px;font:400 9px/1 var(--ui);color:var(--tx3);}
.legend-dot{width:6px;height:6px;border-radius:1px;}
.legend-dot.sux{background:var(--sux);}.legend-dot.akk{background:var(--akk);}.legend-dot.hit{background:var(--hit);}
.legend-dot.elx{background:var(--elx);}.legend-dot.uga{background:var(--uga);}.legend-dot.egy{background:var(--egy);}

/* ── SURFACE TABS ── */
.stabs{background:var(--bg-el);border-bottom:1px solid var(--bd);display:flex;align-items:stretch;padding:0 14px;}
.stab{background:transparent;border:none;border-bottom:2px solid transparent;padding:6px 12px;font:500 11px/1 var(--ui);color:var(--tx3);cursor:pointer;margin-bottom:-1px;}
.stab:hover{color:var(--tx2);}
.stab.on{color:var(--ac);border-bottom-color:var(--ac);}

/* ── MAIN LAYOUT ── */
.main{display:flex;min-height:0;overflow:hidden;}
.content{flex:1;min-width:0;overflow:hidden;}
.scroll{height:100%;overflow:auto;padding:14px 16px 64px;}

/* ── COLUMNS ── */
.cols{display:flex;gap:16px;align-items:flex-start;min-width:max-content;}
.col-w{min-width:240px;}
.col-h{display:flex;align-items:center;gap:5px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
.col-n{font:500 9px/1 var(--ui);text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);}
.lang-b{font:600 8px/1 var(--mono);padding:1px 4px;border-radius:2px;}
.lang-b.sux{color:var(--sux);background:var(--sux-b);}.lang-b.akk{color:var(--akk);background:var(--akk-b);}
.lang-b.hit{color:var(--hit);background:var(--hit-b);}.lang-b.elx{color:var(--elx);background:var(--elx-b);}
.lang-b.uga{color:var(--uga);background:var(--uga-b);}.lang-b.egy{color:var(--egy);background:var(--egy-b);}

/* ── ROW ── */
.tb-r{display:flex;gap:3px;align-items:flex-start;margin-bottom:3px;}
.rn{min-width:24px;font:400 9px/1 var(--mono);color:var(--tx3);flex-shrink:0;padding-top:10px;text-align:right;padding-right:4px;}
.ribs{flex:1;min-width:0;}
.rib-toks{display:flex;border-radius:3px;overflow:hidden;}

/* ── TOKEN (ribbon) ── no language badge, just color border ── */
.tok{display:flex;flex-direction:column;min-width:72px;flex-shrink:0;cursor:pointer;border-left:1px solid rgba(255,255,255,.03);position:relative;transition:background .1s;}
.tok:first-child{border-left:none;}
.tok:hover{background:rgba(255,255,255,.03);}
.tok.T--sel{outline:1.5px solid var(--ac);outline-offset:-1.5px;background:rgba(201,169,98,.06);}
.tok.T--match{background:rgba(201,169,98,.05);}
.tok.T--dim{opacity:.18;pointer-events:none;}
.tok.T--filter-dim{opacity:.08;pointer-events:none;}
.tok.sux{border-top:2px solid var(--sux);}.tok.akk{border-top:2px solid var(--akk);}
.tok.hit{border-top:2px solid var(--hit);}.tok.elx{border-top:2px solid var(--elx);}
.tok.uga{border-top:2px solid var(--uga);}.tok.egy{border-top:2px solid var(--egy);}
/* Markers row (toggleable) */
.tok-markers{display:flex;align-items:center;height:12px;padding:0 4px;gap:2px;}
.hide-markers .tok-markers{display:none;}
.tm{font:600 6px/1 var(--mono);text-transform:uppercase;padding:1px 2px;border-radius:1px;}
.tm.d{color:var(--red);}.tm.u{color:#e2a038;}
.tm.det{color:var(--tx3);font-size:6px;}
.pip-dot{width:4px;height:4px;border-radius:50%;margin-left:auto;flex-shrink:0;}
.pip-dot.s0{background:#333;}.pip-dot.s1{background:var(--hit);opacity:.7;}
.pip-dot.s2{background:var(--akk);opacity:.7;}.pip-dot.s3{background:#e2a038;}.pip-dot.s4{background:var(--sux);}
.hide-markers .pip-dot{display:none;}
/* Token rows */
.tok-row{display:flex;align-items:center;min-height:17px;padding:0 4px;border-top:1px solid rgba(255,255,255,.025);}
.tok-row:first-child{border-top:none;}
.tr-read{font:500 10px/1 var(--mono);color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-read.d{color:#c87860;text-decoration:underline dotted rgba(226,56,56,.3);}
.tr-read.b{color:rgba(255,255,255,.18);font-style:italic;}
.tr-sign{font:400 12px/1 serif;color:var(--tx3);margin-left:2px;flex-shrink:0;}
.tr-norm{font:400 9px/1 var(--mono);color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-lemma{font:400 9px/1 var(--mono);color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-gloss{font:400 9px/1 var(--ui);color:var(--tx3);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── TRANSLATION BAR ── */
.tr-bar{display:flex;align-items:center;gap:4px;min-height:22px;padding:2px 6px;margin-top:1px;}
.tt{font:400 10px/1.4 var(--ui);color:var(--ac);flex:1;min-width:0;opacity:.7;}
.tt.u{color:var(--tx3);font-style:italic;opacity:.5;}
.tt[dir="rtl"]{text-align:right;font-size:11px;}
.comp-r{font:400 7px/1 var(--mono);color:var(--akk);opacity:.5;margin-left:3px;}

/* ── STRUCTURAL LINES ── */
.str-r{display:flex;align-items:center;gap:6px;padding:2px 0 2px 28px;margin:1px 0;}
.str-r::before,.str-r::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05);}
.str-r span{font:500 7px/1 var(--ui);text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.1);}
.str-b{padding:3px 6px 3px 28px;font:400 9px/1 var(--ui);color:rgba(226,56,56,.35);font-style:italic;border-left:2px solid rgba(226,56,56,.12);margin:1px 0;}
.lsep{display:flex;align-items:center;gap:6px;padding:2px 0 2px 28px;margin:1px 0;}
.lsep-l{flex:1;height:1px;background:var(--bd);}
.lsep-c{font:500 7px/1 var(--mono);text-transform:uppercase;letter-spacing:.05em;padding:1px 4px;border-radius:8px;white-space:nowrap;}
.lsep-c.sux{color:var(--sux);background:var(--sux-b);}.lsep-c.akk{color:var(--akk);background:var(--akk-b);}
.lsep-c.hit{color:var(--hit);background:var(--hit-b);}.lsep-c.elx{color:var(--elx);background:var(--elx-b);}
.lsep-c.uga{color:var(--uga);background:var(--uga-b);}.lsep-c.egy{color:var(--egy);background:var(--egy-b);}

/* ── DEPTH CONTROL ── */
.depth-atf .rib-toks,.depth-atf .il-rows-wrap{display:none;}
.depth-atf .atf-raw{display:block;}
.depth-reading .norm-row,.depth-reading .lemma-row{display:none;}
.depth-reading .il-ly.norm,.depth-reading .il-ly.lemma{display:none;}
.depth-full .atf-raw{display:none;}

/* ── ATF RAW VIEW (code-like) ── */
.atf-raw{display:none;font:400 11px/1.7 var(--mono);color:var(--tx);padding:2px 0;white-space:pre-wrap;word-break:break-all;}
.atf-raw .atf-ln{display:flex;gap:0;min-height:18px;}
.atf-raw .atf-num{min-width:28px;color:var(--tx3);text-align:right;padding-right:8px;flex-shrink:0;user-select:none;}
.atf-raw .atf-txt{flex:1;}
.atf-raw .atf-txt .sux-hl{color:var(--sux);}.atf-raw .atf-txt .akk-hl{color:var(--akk);}
.atf-raw .atf-txt .hit-hl{color:var(--hit);}.atf-raw .atf-txt .elx-hl{color:var(--elx);}
.atf-raw .atf-txt .uga-hl{color:var(--uga);}.atf-raw .atf-txt .egy-hl{color:var(--egy);}
.atf-raw .atf-txt .dmg{color:var(--red);opacity:.6;}.atf-raw .atf-txt .brk{color:var(--tx3);font-style:italic;}
.atf-raw .atf-txt .det-hl{color:var(--tx3);font-size:9px;}
.atf-raw .atf-struct{color:var(--tx3);font-style:italic;padding-left:28px;opacity:.5;}

/* ── INTERLINEAR ── */
.il-row{display:flex;gap:0;align-items:flex-start;margin-bottom:6px;}
.il-rn{min-width:24px;font:400 9px/1 var(--mono);color:var(--tx3);flex-shrink:0;padding-top:7px;text-align:right;padding-right:4px;}
.il-blk{flex:1;min-width:0;border-radius:3px;overflow:hidden;}
.il-ly{display:flex;align-items:baseline;border-bottom:1px solid rgba(255,255,255,.025);}
.il-ly:last-child{border-bottom:none;}
.il-lbl{flex-shrink:0;width:36px;text-align:right;padding:4px 6px 4px 0;font:500 7px/1 var(--mono);text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);opacity:.4;}
.il-cells{display:flex;flex-wrap:nowrap;flex:1;}
.il-c{padding:4px 8px 4px 5px;font:400 10px/1 var(--mono);white-space:nowrap;cursor:pointer;transition:background .1s;}
.il-c:hover{background:rgba(255,255,255,.04);}
.il-c.T--sel{background:rgba(201,169,98,.08);outline:1px solid rgba(201,169,98,.25);outline-offset:-1px;}
.il-c.T--match{background:rgba(201,169,98,.05);}
.il-c.T--dim{opacity:.15;}.il-c.T--filter-dim{opacity:.06;}
.il-ly.atf .il-c{color:var(--tx);}
.il-ly.norm .il-c{color:var(--tx2);opacity:.7;}
.il-ly.lemma .il-c{color:var(--tx3);font-size:9px;}
.il-ly.gloss .il-c{color:var(--ac);font-style:italic;font-family:var(--ui);opacity:.7;}
.il-ly.trans .il-c{color:var(--ac);font-family:var(--ui);font-style:italic;font-size:10px;padding:4px 8px;opacity:.6;}
.il-nd{color:rgba(255,255,255,.12);font-style:italic;}

/* ── SIDEBAR (breathable, flat) ── */
.sidebar{width:280px;flex-shrink:0;overflow-y:auto;border-left:1px solid var(--bd);background:var(--bg-p);}
.sb-def{padding:20px 16px;display:flex;flex-direction:column;gap:14px;}
.sb-def-h{font:500 11px/1 var(--ui);color:var(--tx2);}
.sb-def-p{font:400 10px/1.6 var(--ui);color:var(--tx3);}
.sb-states{display:flex;flex-direction:column;gap:3px;}
.sb-sr{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:border-color .1s;}
.sb-sr:hover{border-color:rgba(201,169,98,.15);}
.sb-sb{font:500 8px/1 var(--mono);padding:2px 4px;border-radius:2px;color:var(--tx3);flex-shrink:0;}
.sb-sd{font:400 9px/1.3 var(--ui);color:var(--tx3);}

/* Sidebar filled */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--bd);}
.sb-title{font:500 14px/1.2 var(--mono);color:var(--tx);margin-bottom:4px;}
.sb-subtitle{font:400 10px/1.4 var(--ui);color:var(--tx3);}
.sb-norm-chain{font:400 10px/1 var(--mono);color:var(--tx2);margin-top:6px;padding:5px 0;border-top:1px solid rgba(255,255,255,.04);}
.sb-norm-chain .arr{color:var(--tx3);margin:0 4px;}

/* Sections — flat, no cards */
.sb-sec{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.03);}
.sb-sec:last-child{border-bottom:none;}
.sb-sec-label{font:500 8px/1 var(--ui);text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:8px;}
.sb-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.02);}
.sb-item:last-child{border-bottom:none;}
.sb-item-main{font:400 11px/1.3 var(--ui);color:var(--tx);}
.sb-item-main.primary{color:var(--ac);}
.sb-item-sub{font:400 9px/1.3 var(--ui);color:var(--tx3);margin-top:2px;}
.sb-item-note{font:400 9px/1.3 var(--ui);color:var(--tx3);font-style:italic;margin-top:2px;}
/* Cross-language inline */
.sb-xl{display:flex;align-items:center;gap:6px;padding:4px 0;}
.sb-xl-dot{width:5px;height:5px;border-radius:1px;flex-shrink:0;}
.sb-xl-form{font:400 10px/1 var(--mono);color:var(--tx2);}
.sb-xl-gloss{font:400 9px/1 var(--ui);color:var(--tx3);margin-left:4px;}
/* Next step */
.sb-next{padding:12px 16px;border-top:1px solid rgba(255,255,255,.04);background:rgba(201,169,98,.02);}
.sb-next-label{font:500 8px/1 var(--ui);text-transform:uppercase;letter-spacing:.06em;color:var(--ac);margin-bottom:6px;opacity:.7;}
.sb-next-text{font:400 10px/1.5 var(--ui);color:var(--tx2);}
.sb-next-btn{background:var(--ac);color:#111;border:none;border-radius:3px;padding:4px 10px;font:500 10px/1 var(--ui);cursor:pointer;margin-top:8px;}
.sb-next-btn:hover{opacity:.85;}
/* Pipeline bar */
.sb-pip-bar{display:flex;align-items:center;justify-content:center;gap:0;padding:8px 16px;border-top:1px solid rgba(255,255,255,.04);}
.sb-pip-step{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;flex:1;}
.sb-pip-step:not(:last-child)::after{content:'';position:absolute;top:3px;left:calc(50% + 5px);width:calc(100% - 10px);height:1px;background:rgba(255,255,255,.06);}
.sb-pip-dot{width:7px;height:7px;border-radius:50%;border:1px solid #333;background:transparent;z-index:1;}
.sb-pip-dot.done{background:var(--ac);border-color:var(--ac);}
.sb-pip-dot.imp{background:transparent;border:1px dashed rgba(201,169,98,.3);}
.sb-pip-dot.amb{background:#e2a038;border-color:#c98a20;}
.sb-pip-dot.miss{background:#1e1e1e;border-color:#333;}
.sb-pip-lbl{font:500 6px/1 var(--mono);color:var(--tx3);text-transform:uppercase;letter-spacing:.03em;}
</style>
</head>
<body>
<div id="app" class="app mode-ribbon depth-reading">
  <header class="toolbar">
    <div class="tb-grp" id="modeG">
      <button class="tb-btn on" data-m="ribbon">Ribbon</button>
      <button class="tb-btn" data-m="il">Interlinear</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-grp" id="depthG">
      <button class="tb-btn" data-d="atf">ATF</button>
      <button class="tb-btn on" data-d="reading">Reading</button>
      <button class="tb-btn" data-d="full">Full</button>
    </div>
    <select class="tb-sel" id="langSel">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="he">&#x05E2;&#x05D1;&#x05E8;&#x05D9;&#x05EA;</option>
      <option value="fa">&#x0641;&#x0627;&#x0631;&#x0633;&#x06CC;</option>
    </select>
    <div class="tb-sep"></div>
    <div class="pipe-nav" id="pipeNav">
      <span class="pnl">Jump:</span>
      <button class="s-btn" data-j="jnnfr" data-ps="S0">S0</button>
      <button class="s-btn" data-j="mlk_sign" data-ps="S1">S1</button>
      <button class="s-btn" data-j="abaku" data-ps="S1.5">S1.5</button>
      <button class="s-btn" data-j="kiengi" data-ps="S2">S2</button>
      <button class="s-btn" data-j="bel" data-ps="S3">S3</button>
      <button class="s-btn" data-j="lugal" data-ps="S4">S4</button>
    </div>
    <div class="tb-sep"></div>
    <label class="hl-lbl"><input type="checkbox" id="hlCk" checked><div class="hl-tr"></div><span class="hl-txt">Highlight</span></label>
    <label class="hl-lbl"><input type="checkbox" id="mkCk" checked><div class="hl-tr"></div><span class="hl-txt">Markers</span></label>
  </header>
  <div class="th">
    <span class="th-name">KUB 99.1 + KBo 50.999</span>
    <span class="chip chip-j">+ join</span>
    <span class="chip">LBA, c. 1350 BCE</span>
    <span class="chip">Treaty / Multilingual</span>
    <span class="chip">Hattusa</span>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot sux"></div>SUX</div>
      <div class="legend-item"><div class="legend-dot akk"></div>AKK</div>
      <div class="legend-item"><div class="legend-dot hit"></div>HIT</div>
      <div class="legend-item"><div class="legend-dot elx"></div>ELX</div>
      <div class="legend-item"><div class="legend-dot uga"></div>UGA</div>
      <div class="legend-item"><div class="legend-dot egy"></div>EGY</div>
    </div>
  </div>
  <div class="stabs" id="surfTabs">
    <button class="stab on" data-surf="obv">Obverse</button>
    <button class="stab" data-surf="rev">Reverse</button>
    <button class="stab" data-surf="le">Left Edge</button>
  </div>
  <div class="main">
    <div class="content">
      <div class="scroll" id="scrollArea">
        <div class="cols" id="colsArea"></div>
      </div>
    </div>
    <aside class="sidebar" id="sidebar"></aside>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// TOKEN DATA (carried from v3)
// ═══════════════════════════════════════════════════════════

      {num:'1',toks:['mlk','ugrt'],tr:{en:'King of Ugarit',de:'K\u00f6nig von Ugarit',he:'\u05de\u05dc\u05da \u05d0\u05d5\u05d2\u05e8\u05d9\u05ea',fa:'\u067e\u0627\u062f\u0634\u0627\u0647 \u0627\u0648\u06af\u0627\u0631\u06cc\u062a'}},
      {num:'2',toks:['bn','il'],tr:{en:'son of El',de:'Sohn des El',he:'\u05d1\u05df \u05d0\u05dc',fa:'\u067e\u0633\u0631 \u0627\u06cc\u0644'}},
      {num:'3',toks:['mlk_sign'],tr:{en:'[sign matched]',de:'[Zeichen]',he:'[\u05e1\u05d9\u05de\u05df]',fa:'[\u0639\u0644\u0627\u0645\u062a]'}},
      {num:'4',toks:['mlk','ksp'],tr:{en:'king: silver',de:'K\u00f6nig: Silber',he:'\u05de\u05dc\u05da: \u05db\u05e1\u05e3',fa:'\u067e\u0627\u062f\u0634\u0627\u0647: \u0646\u0642\u0631\u0647'}},
      {ruling:true,label:'single ruling'},
      {num:'5',toks:['tql','ksp'],tr:{en:'he weighed the silver',de:'er wog das Silber',he:'\u05e9\u05e7\u05dc \u05d4\u05db\u05e1\u05e3',fa:'\u0646\u0642\u0631\u0647 \u0631\u0627 \u0648\u0632\u0646 \u06a9\u0631\u062f'}},
      {num:'6',toks:['mspr'],tr:{en:'according to reckoning',de:'nach Abrechnung',he:'\u05dc\u05e4\u05d9 \u05d7\u05e9\u05d1\u05d5\u05df',fa:'\u0637\u0628\u0642 \u0634\u0645\u0627\u0631\u0634'}},
      {num:'7',toks:['ytn','mlk','ugrt'],tr:{en:'he gave, king of Ugarit',de:'er gab, K\u00f6nig von Ugarit',he:'\u05e0\u05ea\u05df, \u05de\u05dc\u05da \u05d0\u05d5\u05d2\u05e8\u05d9\u05ea',fa:'\u062f\u0627\u062f, \u067e\u0627\u062f\u0634\u0627\u0647 \u0627\u0648\u06af\u0627\u0631\u06cc\u062a'}},
    ]},
    {id:'rev-ii',num:'v',lang:'egy',label:'Column v',lines:[
      {num:'1',toks:['nswt','bjty'],tr:{en:'King of Upper and Lower Egypt',de:'K\u00f6nig \u00c4gyptens',he:'\u05de\u05dc\u05da \u05de\u05e6\u05e8\u05d9\u05dd',fa:'\u067e\u0627\u062f\u0634\u0627\u0647 \u0645\u0635\u0631'}},
      {num:'2',toks:['nfr_hpr'],tr:{en:'[Akhenaten] (broken)',de:'[Echnaton]',he:'[\u05d0\u05d7\u05e0\u05d0\u05ea\u05df]',fa:'[\u0622\u062e\u0646\u0627\u062a\u0648\u0646]'}},
      {num:'3',toks:['nbtawy'],tr:{en:'lord of the two lands',de:'Herr der L\u00e4nder',he:'\u05d0\u05d3\u05d5\u05df \u05d4\u05d0\u05e8\u05e6\u05d5\u05ea',fa:'\u0633\u0631\u0648\u0631 \u062f\u0648 \u0633\u0631\u0632\u0645\u06cc\u0646'}},
      {num:'4',toks:['jnnfr'],tr:{en:'[unidentified]',de:'[unidentifiziert]',he:'[\u05dc\u05d0 \u05de\u05d6\u05d5\u05d4\u05d4]',fa:'[\u0634\u0646\u0627\u0633\u0627\u06cc\u06cc \u0646\u0634\u062f\u0647]'}},
      {num:'5',toks:['anh'],tr:{en:'living forever',de:'lebend ewiglich',he:'\u05d7\u05d9 \u05dc\u05e0\u05e6\u05d7',fa:'\u0632\u0646\u062f\u06af\u06cc \u0627\u0628\u062f\u06cc'}},
      {ruling:true,label:'double ruling'},
      {num:'6',toks:['htp'],tr:{en:'royal offering formula',de:'Opferformel',he:'\u05e0\u05d5\u05e1\u05d7\u05ea \u05e7\u05e8\u05d1\u05df',fa:'\u0641\u0631\u0645\u0648\u0644 \u0646\u0630\u0631\u06cc'}},
      {num:'7',toks:['wsr'],tr:{en:'Ramesses II',de:'Ramses II',he:'\u05e8\u05e2\u05de\u05e1\u05e1 \u05d1',fa:'\u0631\u0627\u0645\u0633\u0633 \u062f\u0648\u0645'}},
    ]},
  ]},
  {id:'le',label:'Left Edge',columns:[
    {id:'le-i',num:'vi',lang:'akk',label:'Colophon',lines:[
      {num:'1',toks:['umma','LUGAL'],tr:{en:'Thus the King',de:'So der K\u00f6nig',he:'\u05db\u05d4 \u05d4\u05de\u05dc\u05da',fa:'\u0686\u0646\u06cc\u0646 \u067e\u0627\u062f\u0634\u0627\u0647'}},
      {num:'2',toks:['ina','tuppim'],tr:{en:'on this tablet',de:'auf dieser Tafel',he:'\u05e2\u05dc \u05d4\u05dc\u05d5\u05d7',fa:'\u0628\u0631 \u0631\u0648\u06cc \u0644\u0648\u062d'}},
      {num:'3',toks:['mu','bala','sisa'],tr:{en:'year of righteous reign',de:'Jahr gerechter Regentschaft',he:'\u05e9\u05e0\u05ea \u05de\u05dc\u05db\u05d5\u05ea \u05e6\u05d3\u05e7',fa:'\u0633\u0627\u0644 \u0633\u0644\u0637\u0646\u062a \u0639\u0627\u062f\u0644\u0627\u0646\u0647'}},
    ]},
  ]},
];

// ─── STATE ───
var activeLang='en',hlOn=true,selectedTokId=null,activeSurface='obv',displayMode='ribbon',depthMode='reading',filterState=null,showMarkers=true;
var instanceMap={},tokCounter=0;
function ps(p){if(!p)return'S0';if(p.startsWith('S4'))return'S4';if(p.startsWith('S3'))return'S3';if(p.startsWith('S2'))return'S2';if(p.startsWith('S1.5'))return'S1.5';if(p.startsWith('S1'))return'S1';return'S0';}
function pc(p){var s=ps(p);return s==='S4'?'s4':s==='S3'?'s3':s==='S2'?'s2':s==='S1'||s==='S1.5'?'s1':'s0';}

// ─── ATF RAW RENDER (non-interactive, code-like) ───
function renderATFRaw(col){
  var h='';
  col.lines.forEach(function(line){
    if(line.ruling){h+='<div class="atf-struct">$ '+(line.label||'ruling')+'</div>';return;}
    if(line.broken&&!line.toks){h+='<div class="atf-struct">$ '+(line.text||'broken')+'</div>';return;}
    if(line.switch){h+='<div class="atf-struct">% '+line.lang+'</div>';return;}
    var toks=(line.toks||[]).map(function(tid){var t=T[tid];if(!t)return'';return '<span class="'+t.lang+'-hl">'+t.atf+'</span>';}).join(' ');
    h+='<div class="atf-ln"><span class="atf-num">'+(line.num||'')+'.</span><span class="atf-txt">'+toks+'</span></div>';
  });
  return '<div class="atf-raw">'+h+'</div>';
}

// ─── RIBBON TOKEN (no language badge — just color border) ───
function renderRibbonToken(tid,li,ti,cid){
  var t=T[tid];if(!t)return'';
  var uid='rt-'+cid+'-'+li+'-'+ti;
  if(!instanceMap[tid])instanceMap[tid]=[];
  instanceMap[tid].push(uid);
  var dmg=t.damaged?' d':'',brk=t.broken?' b':'';
  var markers='';
  if(t.damaged)markers+='<span class="tm d">#</span>';
  if(t.det)markers+='<span class="tm det">{'+t.det+'}</span>';
  markers+='<span class="pip-dot '+pc(t.pipeline)+'"></span>';
  var norm=t.norm||'<span style="opacity:.2">\u2014</span>';
  var lemma=t.lemma||'<span style="opacity:.2">\u2014</span>';
  var gloss=t.gloss||'<span style="opacity:.2">\u2014</span>';
  return '<div class="tok '+t.lang+'" id="'+uid+'" data-tid="'+tid+'" data-lemma="'+(t.lemma||'')+'" data-ps="'+ps(t.pipeline)+'" tabindex="0">'+
    '<div class="tok-markers">'+markers+'</div>'+
    '<div class="tok-row"><span class="tr-read'+dmg+brk+'">'+t.atf+'</span></div>'+
    '<div class="tok-row norm-row"><span class="tr-norm">'+norm+'</span></div>'+
    '<div class="tok-row lemma-row"><span class="tr-lemma">'+lemma+'</span></div>'+
    '<div class="tok-row gloss-row"><span class="tr-gloss">'+gloss+'</span></div>'+
  '</div>';
}
function renderRibbonLine(line,li,cid){
  if(line.ruling)return '<div class="str-r"><span>'+(line.label||'ruling')+'</span></div>';
  if(line.broken&&!line.toks)return '<div class="str-b">'+(line.text||'[broken]')+'</div>';
  if(line.switch)return '<div class="lsep"><div class="lsep-l"></div><span class="lsep-c '+line.lang+'">'+line.lang.toUpperCase()+'</span><div class="lsep-l"></div></div>';
  var toks=(line.toks||[]).map(function(tid,ti){return renderRibbonToken(tid,li,ti,cid)}).join('');
  var tr=line.tr||{},matched=!!(tr.en),rtl=activeLang==='he'||activeLang==='fa';
  var comp=line.composite_ref?'<span class="comp-r">'+line.composite_ref+'</span>':'';
  return '<div class="tb-r"><div class="rn">'+(line.num||'')+'</div><div class="ribs">'+
    '<div class="rib-toks">'+toks+'</div>'+
    '<div class="tr-bar"><span class="tt'+(matched?'':' u')+'"'+(rtl?' dir="rtl"':'')+'>'+(tr[activeLang]||tr.en||'\u2014')+'</span>'+comp+'</div>'+
  '</div></div>';
}

// ─── INTERLINEAR ───
function renderILToken(tid,layer){
  var t=T[tid];if(!t)return '<span class="il-c"><span class="il-nd">\u2014</span></span>';
  var uid='il-'+layer+'-'+tid+'-'+(tokCounter++);
  var content='';
  if(layer==='atf')content=t.atf;
  else if(layer==='norm')content=t.norm||'<span class="il-nd">\u2014</span>';
  else if(layer==='lemma')content=t.lemma||'<span class="il-nd">\u2014</span>';
  else if(layer==='gloss')content=t.gloss||'<span class="il-nd">\u2014</span>';
  return '<span class="il-c" id="'+uid+'" data-tid="'+tid+'" data-lemma="'+(t.lemma||'')+'" data-ps="'+ps(t.pipeline)+'">'+content+'</span>';
}
function renderILLine(line,cid){
  if(line.ruling)return '<div class="str-r"><span>'+(line.label||'ruling')+'</span></div>';
  if(line.broken&&!line.toks)return '<div class="str-b">'+(line.text||'[broken]')+'</div>';
  if(line.switch)return '<div class="lsep"><div class="lsep-l"></div><span class="lsep-c '+line.lang+'">'+line.lang.toUpperCase()+'</span><div class="lsep-l"></div></div>';
  var toks=line.toks||[],layers=['atf','norm','lemma','gloss'];
  var lh=layers.map(function(ly){return '<div class="il-ly '+ly+'"><span class="il-lbl">'+ly+'</span><div class="il-cells">'+toks.map(function(tid){return renderILToken(tid,ly)}).join('')+'</div></div>';}).join('');
  var tr=line.tr||{},rtl=activeLang==='he'||activeLang==='fa';
  lh+='<div class="il-ly trans"><span class="il-lbl">trans</span><div class="il-cells"><span class="il-c"'+(rtl?' dir="rtl"':'')+'>'+(tr[activeLang]||tr.en||'\u2014')+'</span></div></div>';
  return '<div class="il-row"><div class="il-rn">'+(line.num||'')+'</div><div class="il-blk">'+lh+'</div></div>';
}

function renderCol(col){
  var lines,atfRaw=renderATFRaw(col);
  if(displayMode==='ribbon')lines=col.lines.map(function(l,i){return renderRibbonLine(l,i,col.id)}).join('');
  else lines=col.lines.map(function(l){return renderILLine(l,col.id)}).join('');
  return '<div class="col-w"><div class="col-h"><span class="col-n">'+col.label+'</span><span class="lang-b '+col.lang+'">'+col.lang.toUpperCase()+'</span></div>'+atfRaw+lines+'</div>';
}

function renderSurface(){
  var surf=SURFACES.find(function(s){return s.id===activeSurface});if(!surf)return;
  Object.keys(instanceMap).forEach(function(k){instanceMap[k]=[]});tokCounter=0;
  document.getElementById('colsArea').innerHTML=surf.columns.map(function(c){return renderCol(c)}).join('');
  if(filterState)applyFilter(filterState);
  if(selectedTokId)selectToken(selectedTokId,null,true);
}

// ─── SIDEBAR (flat, breathable) ───
function renderSidebar(tid){
  var t=T[tid];if(!t){document.getElementById('sidebar').innerHTML=renderSidebarDefault();return;}
  var p=ps(t.pipeline),h='';
  // Header
  h+='<div class="sb-head"><div class="sb-title">'+t.atf+'</div>';
  h+='<div class="sb-subtitle">'+LN[t.lang]+' \u00b7 '+(t.lemma||'no lemma')+(t.src?' \u00b7 '+t.src:'')+'</div>';
  if(t.norm_chain)h+='<div class="sb-norm-chain">'+t.norm_chain.replace(/\u2192/g,'<span class="arr">\u2192</span>')+'</div>';
  h+='</div>';
  // Candidates (S1.5, S3)
  if((p==='S1.5'||p==='S3')&&t.pl){
    h+='<div class="sb-sec"><div class="sb-sec-label">'+(p==='S3'?'Disambiguation':'Candidates')+'</div>';
    t.pl.forEach(function(l){
      h+='<div class="sb-item"><div class="sb-item-main'+(l.p?' primary':'')+'">'+l.f+'</div>';
      h+='<div class="sb-item-sub">'+l.g+(l.a?' \u00b7 '+l.a.toLocaleString()+' att.':'')+'</div>';
      if(l.note)h+='<div class="sb-item-note">'+l.note+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }
  // Glosses
  if(t.gls&&t.gls.length&&(p==='S2'||p==='S4')){
    h+='<div class="sb-sec"><div class="sb-sec-label">Glosses</div>';
    t.gls.forEach(function(g){
      h+='<div class="sb-item"><div class="sb-item-main'+(g.p?' primary':'')+'">'+g.t+'</div></div>';
    });
    h+='</div>';
  }
  // Spellings
  if(p==='S4'&&t.sp&&t.sp.length){
    h+='<div class="sb-sec"><div class="sb-sec-label">Spellings</div>';
    t.sp.forEach(function(s){h+='<div class="sb-item"><div class="sb-item-sub" style="font-family:var(--mono)">'+s+'</div></div>';});
    h+='</div>';
  }
  // Cross-language
  if(t.xl&&t.xl.length){
    h+='<div class="sb-sec"><div class="sb-sec-label">Cross-Language</div>';
    t.xl.forEach(function(x){
      var lc=x.l;
      h+='<div class="sb-xl"><div class="sb-xl-dot legend-dot '+lc+'"></div><span class="sb-xl-form">'+x.f+'</span><span class="sb-xl-gloss">'+x.g+'</span></div>';
    });
    h+='</div>';
  }
  // Context
  if(t.ctx){
    var c=t.ctx;
    h+='<div class="sb-sec"><div class="sb-sec-label">Context</div><div class="sb-item-sub">'+(c.period||'')+' \u00b7 '+(c.genre||'')+' \u00b7 '+(c.prov||'')+(c.uses?' \u00b7 '+c.uses+'\u00d7 on this tablet':'')+'</div></div>';
  }
  // Next step
  if(t.ns||p==='S0'||p==='S1'||p==='S1.5'||p==='S2'||p==='S3'){
    var ns=t.ns||'Refine lemma and verify gloss.';
    h+='<div class="sb-next"><div class="sb-next-label">Next Step</div><div class="sb-next-text">'+ns+'</div></div>';
  }
  // Pipeline bar
  var hasSign=!!t.sign,hasNorm=!!t.norm,hasLemma=!!t.lemma,hasGloss=!!t.gloss,isAmb=p==='S3',isImp=t.lang==='sux'&&!t.norm_chain;
  var steps=[{l:'Sign',c:hasSign?'done':'miss'},{l:'Read',c:'done'},{l:'Norm',c:hasNorm?'done':(isImp?'imp':(p==='S1.5'?'done':'miss'))},{l:'Lemma',c:hasLemma?'done':(isAmb?'amb':'miss')},{l:'Gloss',c:hasGloss?'done':'miss'}];
  h+='<div class="sb-pip-bar">'+steps.map(function(s){return '<div class="sb-pip-step"><div class="sb-pip-dot '+s.c+'"></div><span class="sb-pip-lbl">'+s.l+'</span></div>';}).join('')+'</div>';
  document.getElementById('sidebar').innerHTML=h;
}

function renderSidebarDefault(){
  return '<div class="sb-def"><div class="sb-def-h">Select a token</div><div class="sb-def-p">Click any token to inspect its pipeline state and translation data. Use S0\u2013S4 buttons to jump. Shift+click to filter.</div>'+
    '<div class="sb-states">'+
    [['S0','jnnfr','No data (Egyptian)'],['S1','mlk_sign','Sign matched (Ugaritic)'],['S1','ibtasa','Norm only (Hittite)'],['S1.5','abaku','Norm candidates (Akkadian)'],['S1.5','karan','3 candidates (Elamite)'],['S2','kiengi','Lemmatized (Sumerian)'],['S2','sarrim','Norm chain (Akkadian)'],['S2','lu2','With glosses (Sumerian)'],['S3','bel','Ambiguous (Akkadian)'],['S3','ursag','Ambiguous (Hittite)'],['S4','lugal','Complete (Sumerian)'],['S4','tuppim','Complete + norm (Akkadian)']].map(function(r){
      return '<div class="sb-sr" data-j="'+r[1]+'"><span class="sb-sb">'+r[0]+'</span><span class="sb-sd">'+r[2]+'</span></div>';
    }).join('')+'</div></div>';
}

// ─── EVENTS ───
function clearSelection(){
  document.querySelectorAll('.T--sel,.T--match,.T--dim').forEach(function(el){el.classList.remove('T--sel','T--match','T--dim')});
  selectedTokId=null;
  document.getElementById('sidebar').innerHTML=renderSidebarDefault();
}
function selectToken(tid,domId,silent){
  // Toggle: click selected token again to deselect
  if(tid===selectedTokId&&!silent){clearSelection();return;}
  document.querySelectorAll('.T--sel,.T--match,.T--dim').forEach(function(el){el.classList.remove('T--sel','T--match','T--dim')});
  selectedTokId=tid;
  var t=T[tid];if(!t)return;
  var lemma=t.lemma||'';
  if(hlOn&&lemma){
    document.querySelectorAll('[data-lemma]').forEach(function(el){
      if(el.dataset.tid===tid)el.classList.add('T--sel');
      else if(el.dataset.lemma&&el.dataset.lemma===lemma)el.classList.add('T--match');
      else el.classList.add('T--dim');
    });
  }else{
    document.querySelectorAll('[data-tid="'+tid+'"]').forEach(function(el){el.classList.add('T--sel')});
  }
  if(!silent)renderSidebar(tid);
}
function jumpToToken(tid){
  var ids=instanceMap[tid];
  if(!ids||!ids.length){
    for(var si=0;si<SURFACES.length;si++){var surf=SURFACES[si];
      for(var ci=0;ci<surf.columns.length;ci++){
        for(var li=0;li<surf.columns[ci].lines.length;li++){
          var line=surf.columns[ci].lines[li];
          if(line.toks&&line.toks.indexOf(tid)>=0){setActiveSurface(surf.id);setTimeout(function(){jumpToToken(tid)},50);return;}
    }}}return;}
  var el=document.getElementById(ids[0]);if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
  setTimeout(function(){selectToken(tid,ids[0])},300);
}
function applyFilter(p){
  filterState=p;
  document.querySelectorAll('.T--filter-dim').forEach(function(el){el.classList.remove('T--filter-dim')});
  if(!p){document.querySelectorAll('.s-btn').forEach(function(b){b.classList.remove('filtered')});return;}
  document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('filtered',b.dataset.ps===p)});
  document.querySelectorAll('[data-ps]').forEach(function(el){if(el.classList.contains('s-btn'))return;if(el.dataset.ps!==p)el.classList.add('T--filter-dim');});
}
function setMode(m){displayMode=m;document.getElementById('app').classList.toggle('mode-ribbon',m==='ribbon');document.getElementById('app').classList.toggle('mode-il',m==='il');document.querySelectorAll('[data-m]').forEach(function(b){b.classList.toggle('on',b.dataset.m===m)});renderSurface();}
function setDepth(d){depthMode=d;var app=document.getElementById('app');['depth-atf','depth-reading','depth-full'].forEach(function(c){app.classList.remove(c)});app.classList.add('depth-'+d);document.querySelectorAll('[data-d]').forEach(function(b){b.classList.toggle('on',b.dataset.d===d)});}
function setLang(l){activeLang=l;renderSurface();}
function setActiveSurface(id){activeSurface=id;document.querySelectorAll('[data-surf]').forEach(function(s){s.classList.toggle('on',s.dataset.surf===id)});clearSelection();renderSurface();}

function init(){
  renderSurface();
  document.getElementById('sidebar').innerHTML=renderSidebarDefault();
  document.getElementById('modeG').addEventListener('click',function(e){var b=e.target.closest('[data-m]');if(b)setMode(b.dataset.m)});
  document.getElementById('depthG').addEventListener('click',function(e){var b=e.target.closest('[data-d]');if(b)setDepth(b.dataset.d)});
  document.getElementById('langSel').addEventListener('change',function(e){setLang(e.target.value)});
  document.getElementById('hlCk').addEventListener('change',function(e){hlOn=e.target.checked;if(!hlOn)document.querySelectorAll('.T--dim').forEach(function(el){el.classList.remove('T--dim')})});
  document.getElementById('mkCk').addEventListener('change',function(e){showMarkers=e.target.checked;document.getElementById('app').classList.toggle('hide-markers',!showMarkers)});
  document.getElementById('colsArea').addEventListener('click',function(e){
    var tok=e.target.closest('.tok');if(tok){selectToken(tok.dataset.tid,tok.id);return;}
    var c=e.target.closest('.il-c');if(c&&c.dataset.tid){selectToken(c.dataset.tid,c.id);return;}
  });
  document.getElementById('pipeNav').addEventListener('click',function(e){var b=e.target.closest('[data-j]');if(!b)return;if(e.shiftKey){var p=b.dataset.ps;applyFilter(filterState===p?null:p);}else jumpToToken(b.dataset.j);});
  document.getElementById('surfTabs').addEventListener('click',function(e){var t=e.target.closest('[data-surf]');if(t)setActiveSurface(t.dataset.surf)});
  document.getElementById('sidebar').addEventListener('click',function(e){var r=e.target.closest('[data-j]');if(r)jumpToToken(r.dataset.j)});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSelection();filterState=null;applyFilter(null);}});
}
