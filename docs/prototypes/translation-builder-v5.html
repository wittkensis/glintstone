<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translation Builder v5 · KUB 99.1 + KBo 50.999</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   v5 DESIGN TOKENS
   WCAG AA: all text ≥4.5:1 against bg
   Accent used ONLY for: active selection, CTA buttons, action-needed badges
   ════════════════════════════════════════════════════════════ */
:root {
  --bg:#0f0f0f;--bg-s:#151515;--bg-r:#1a1a1a;--bg-h:#1f1f1f;
  --bd:#252525;--bd-f:#333;
  /* accent: reserved for selection + CTAs only */
  --ac:#c9a962;--ac-lo:rgba(201,169,98,.08);--ac-md:rgba(201,169,98,.18);
  /* text: AA-compliant on #0f0f0f */
  --t1:#d4d2cf;--t2:#9a9894;--t3:#6b6965;--t4:#454340;
  /* damage/certainty */
  --dmg:#cf6b5e;--unc:#d4a24e;--corr:#7eb87e;--dmg-bg:rgba(207,107,94,.06);
  /* languages: muted palette, used as subtle left-pip only */
  --sux:#6b8e6b;--akk:#7da8c4;--hit:#b8926a;--elx:#a080b8;--uga:#c08878;--egy:#b0a860;
  --mono:'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace;
  --ui:'Inter',system-ui,sans-serif;
  --serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:var(--ui);font-size:13px;line-height:1.5;overflow:hidden}
.app{display:grid;grid-template-rows:38px 36px 1fr;height:100vh;overflow:hidden}

/* ── TOOLBAR ── */
.toolbar{background:var(--bg-s);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;padding:0 12px;z-index:10;overflow-x:auto}
.tb-sep{width:1px;height:14px;background:var(--bd);flex-shrink:0}
.tb-grp{display:flex;border-radius:4px;overflow:hidden;border:1px solid var(--bd);flex-shrink:0}
.tb-btn{background:transparent;border:none;padding:4px 9px;font:500 10px/1 var(--ui);color:var(--t3);cursor:pointer;transition:all .12s}
.tb-btn:hover{color:var(--t2)}
.tb-btn.on{background:var(--t2);color:var(--bg);font-weight:600}
.tb-sel{background:transparent;border:1px solid var(--bd);border-radius:4px;padding:3px 8px;color:var(--t2);font:400 10px/1 var(--ui);cursor:pointer;flex-shrink:0}
.s-btn{background:transparent;border:1px solid var(--bd);border-radius:3px;padding:2px 5px;font:500 9px/1 var(--mono);color:var(--t3);cursor:pointer;transition:all .1s}
.s-btn:hover{border-color:var(--t2);color:var(--t2)}
.s-btn.filtered{background:var(--t2);color:var(--bg);border-color:var(--t2)}
.pnl{font:500 8px/1 var(--ui);text-transform:uppercase;letter-spacing:.05em;color:var(--t4);margin-right:2px}
.pipe-nav{display:flex;align-items:center;gap:3px;flex-shrink:0}
.tb-toggle{display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.tb-toggle input{display:none}
.tb-sw{width:24px;height:12px;background:var(--t4);border-radius:6px;position:relative;transition:background .15s}
.tb-sw::after{content:'';position:absolute;top:1.5px;left:1.5px;width:9px;height:9px;background:var(--t3);border-radius:50%;transition:all .15s}
.tb-toggle input:checked+.tb-sw{background:rgba(154,152,148,.4)}
.tb-toggle input:checked+.tb-sw::after{left:13.5px;background:var(--t1)}
.tb-toggle-l{font:400 9px/1 var(--ui);color:var(--t3)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px}

/* ── HEADER + TABS combined ── */
.header-bar{background:var(--bg-s);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px}
.th-name{font:500 11px/1 var(--mono);color:var(--t1)}
.chip{font:400 8px/1.2 var(--ui);padding:1px 5px;border-radius:2px;color:var(--t3);border:1px solid var(--bd)}
.chip-j{color:var(--t2);border-color:var(--t4)}
.stab{background:transparent;border:none;padding:5px 10px;font:500 10px/1 var(--ui);color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.stab:hover{color:var(--t2)}
.stab.on{color:var(--t1);border-bottom-color:var(--t1)}
.legend{display:flex;align-items:center;gap:6px;margin-left:auto}
.legend-i{display:flex;align-items:center;gap:2px;font:400 8px/1 var(--ui);color:var(--t3)}
.legend-d{width:8px;height:3px;border-radius:1px}
.legend-d.sux{background:var(--sux)}.legend-d.akk{background:var(--akk)}.legend-d.hit{background:var(--hit)}
.legend-d.elx{background:var(--elx)}.legend-d.uga{background:var(--uga)}.legend-d.egy{background:var(--egy)}
/* Marker legend (in toolbar) */
.mk-legend{display:flex;align-items:center;gap:6px;font:400 8px/1 var(--ui);color:var(--t4)}
.mk-legend span{display:inline-flex;align-items:center;gap:2px}
.mk-s{font:700 9px/1 var(--mono)}
.mk-s.d{color:var(--dmg)}.mk-s.u{color:var(--unc)}.mk-s.c{color:var(--corr)}.mk-s.du{color:var(--dmg)}

/* ── MAIN LAYOUT ── */
.main{display:flex;min-height:0;overflow:hidden}
.content{flex:1;min-width:0;overflow:hidden}
.scroll{height:100%;overflow:auto;padding:16px 16px 80px}

/* ── COMPOSITE NAV ── */
.comp-nav{display:flex;align-items:center;gap:0;margin-bottom:12px;padding:6px 10px;background:var(--bg-s);border:1px solid var(--bd);border-radius:4px;font:400 9px/1 var(--ui);color:var(--t3)}
.comp-tab{padding:4px 8px;border-radius:3px;cursor:pointer;transition:all .1s;white-space:nowrap}
.comp-tab:hover{color:var(--t2);background:var(--bg-h)}
.comp-tab.on{color:var(--t1);background:var(--bg-h);font-weight:500}
.comp-tab.ext{color:var(--t4);border:1px dashed var(--t4);margin-left:2px}
.comp-tab.ext:hover{border-color:var(--t3);color:var(--t3)}
.comp-arr{color:var(--t4);padding:0 2px;font-size:10px}
.comp-label{font:500 7px/1 var(--ui);text-transform:uppercase;letter-spacing:.05em;color:var(--t4);margin-right:6px}

/* ── COLUMNS ── */
.cols{display:flex;gap:20px;align-items:flex-start;min-width:max-content}
.col-w{min-width:240px}
.col-h{display:flex;align-items:center;gap:4px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.col-n{font:500 9px/1 var(--ui);text-transform:uppercase;letter-spacing:.05em;color:var(--t3)}
.col-lang{width:10px;height:3px;border-radius:1px}

/* ── ROW (ribbon) ── generous spacing, subtle separator lines ── */
.row-group{margin-bottom:16px}
.tb-r{display:flex;gap:0;align-items:stretch;margin-bottom:0;padding:4px 0;border-left:2px solid transparent;border-bottom:1px solid rgba(255,255,255,.04);border-radius:0;transition:border-color .15s,background .15s}
.tb-r:last-child{border-bottom:none}
.tb-r.row--sel{border-left-color:var(--ac);background:var(--ac-lo)}
.rn{min-width:28px;font:400 9px/1 var(--mono);color:var(--t3);flex-shrink:0;padding:6px 6px 6px 4px;text-align:right}
.ribs{flex:1;min-width:0}
.rib-toks{display:flex;padding-top:2px}

/* ── TOKEN (ribbon) ── no per-token lang markers ── */
.tok{display:flex;flex-direction:column;min-width:68px;flex-shrink:0;cursor:pointer;position:relative;transition:background .12s;padding-left:3px}
.tok:hover{background:rgba(255,255,255,.025)}
/* Language boundary marker — placed on first token when lang changes */
.tok.lang-boundary::before{content:attr(data-lang-label);position:absolute;top:-10px;left:0;font:500 7px/1 var(--mono);text-transform:uppercase;letter-spacing:.03em;padding:1px 3px;border-radius:2px}
.tok.lang-boundary.sux::before{color:var(--sux)}.tok.lang-boundary.akk::before{color:var(--akk)}
.tok.lang-boundary.hit::before{color:var(--hit)}.tok.lang-boundary.elx::before{color:var(--elx)}
.tok.lang-boundary.uga::before{color:var(--uga)}.tok.lang-boundary.egy::before{color:var(--egy)}
.tok.T--sel{background:var(--ac-md);outline:1.5px solid var(--ac);outline-offset:-1.5px}
.tok.T--sel::before{opacity:1}
.tok.T--rel{outline:1px dotted rgba(154,152,148,.25);outline-offset:-1px}
.tok.T--dim{opacity:.25;pointer-events:none}
.tok.T--filter-dim{opacity:.08;pointer-events:none}
/* Markers — always inline next to reading, no height change */
.tok-markers{display:inline;margin-left:2px}
.hide-markers .tok-markers{display:none}
.tm{font:700 8px/1 var(--mono)}
.tm.d{color:var(--dmg)}/* # damaged */.tm.u{color:var(--unc)}/* ? uncertain */
.tm.c{color:var(--corr)}/* ! corrected */.tm.du{color:var(--dmg)}/* !? */
.tm.det{color:var(--t3);font:400 7px/1 var(--mono)}
/* Gloss/lemma count badge — shows when >1 available */
.tok-badge{position:absolute;top:2px;right:2px;font:600 7px/1 var(--mono);color:var(--t2);background:var(--bg-h);border:1px solid var(--bd);border-radius:2px;padding:0 2px;line-height:11px}
.tok-badge.needs-action{color:var(--ac);border-color:rgba(201,169,98,.3)}
/* Token rows */
.tok-row{display:flex;align-items:center;min-height:16px;padding:0 4px}
.tr-read{font:500 10px/1.3 var(--mono);color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-read.d{color:var(--dmg);text-decoration-line:underline;text-decoration-style:dotted;text-decoration-color:rgba(207,107,94,.4);text-underline-offset:2px}
.tr-read.u{color:var(--unc)}.tr-read.c{color:var(--corr)}.tr-read.b{color:var(--t3);font-style:italic}
.tr-norm{font:400 9px/1.2 var(--mono);color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-lemma{font:400 9px/1.2 var(--mono);color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-gloss{font:400 9px/1.2 var(--ui);color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── TRANSLATION ── visually distinct; only shown when data exists ── */
.tr-bar{display:flex;align-items:center;gap:5px;min-height:22px;padding:2px 6px;margin-top:2px;border-left:2px solid rgba(201,169,98,.25);margin-left:2px}
.tt{font:400 10px/1.5 var(--ui);color:var(--t1);flex:1;font-style:italic}
.tt[dir="rtl"]{text-align:right;font-size:11px}
.comp-r{font:400 7px/1 var(--mono);color:var(--t4);margin-left:4px}

/* ── STRUCTURAL ── all labeled explicitly ── */
/* Rulings: labeled horizontal line */
.str-r{display:flex;align-items:center;gap:6px;margin:8px 0;padding:0 0 0 32px}
.str-r::before,.str-r::after{content:'';flex:1;height:1px;background:var(--bd)}
.str-r .str-label{font:400 8px/1 var(--ui);color:var(--t4);white-space:nowrap;text-transform:lowercase}
.str-r.double::before,.str-r.double::after{height:0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:1px 0}
/* Broken/missing: dashed gap with count */
.str-brk{display:flex;align-items:center;gap:6px;padding:6px 0 6px 32px;margin:4px 0}
.str-brk-line{flex:1;border-top:1px dashed var(--t4)}
.str-brk-label{font:400 8px/1 var(--ui);color:var(--t4);white-space:nowrap;padding:0 4px}
/* Language switch */
.lsep{display:flex;align-items:center;gap:4px;padding:3px 0 3px 32px;margin:4px 0}
.lsep-l{flex:1;height:1px;background:var(--bd)}
.lsep-c{font:500 7px/1 var(--mono);text-transform:uppercase;letter-spacing:.04em;padding:1px 4px;border-radius:6px}
.lsep-c.sux{color:var(--sux)}.lsep-c.akk{color:var(--akk)}.lsep-c.hit{color:var(--hit)}
.lsep-c.elx{color:var(--elx)}.lsep-c.uga{color:var(--uga)}.lsep-c.egy{color:var(--egy)}

/* ── DEPTH ── */
.depth-atf .rib-toks,.depth-atf .il-rows-wrap{display:none}
.depth-atf .atf-raw{display:block}
.depth-reading .norm-row,.depth-reading .lemma-row{display:none}
.depth-reading .il-ly.norm,.depth-reading .il-ly.lemma{display:none}
.depth-full .atf-raw{display:none}
/* ATF raw */
.atf-raw{display:none;font:400 11px/1.7 var(--mono);color:var(--t1);padding:2px 0}
.atf-raw .atf-ln{display:flex;min-height:18px}
.atf-raw .atf-num{min-width:28px;color:var(--t3);text-align:right;padding-right:8px;flex-shrink:0;user-select:none}
.atf-raw .atf-txt{flex:1}
.atf-raw .sux-hl{color:var(--sux)}.atf-raw .akk-hl{color:var(--akk)}.atf-raw .hit-hl{color:var(--hit)}
.atf-raw .elx-hl{color:var(--elx)}.atf-raw .uga-hl{color:var(--uga)}.atf-raw .egy-hl{color:var(--egy)}
.atf-raw .atf-struct{color:var(--t4);font-style:italic;padding-left:28px}

/* ── INTERLINEAR ── labels hidden until hover ── */
.il-row{display:flex;gap:0;align-items:stretch;margin-bottom:0;padding:4px 0;border-left:2px solid transparent;border-bottom:1px solid rgba(255,255,255,.04);transition:border-color .15s,background .15s}
.il-row:last-child{border-bottom:none}
.il-row.row--sel{border-left-color:var(--ac);background:var(--ac-lo)}
.il-rn{min-width:26px;font:400 9px/1 var(--mono);color:var(--t3);flex-shrink:0;padding:6px 4px 0 0;text-align:right}
.il-blk{flex:1;min-width:0;border-radius:3px;overflow:hidden}
.il-ly{display:flex;align-items:baseline}
.il-lbl{flex-shrink:0;width:0;overflow:hidden;font:500 7px/1 var(--mono);text-transform:uppercase;letter-spacing:.04em;color:var(--t4);text-align:right;padding-right:0;opacity:0;transition:width .15s,opacity .15s,padding .15s}
.il-row.row--sel .il-lbl{width:28px;padding-right:4px;opacity:.7}
.il-cells{display:flex;flex-wrap:nowrap;flex:1}
.il-c{padding:3px 7px 3px 4px;font:400 10px/1.2 var(--mono);white-space:nowrap;cursor:pointer;transition:background .1s}
.il-c:hover{background:rgba(255,255,255,.03)}
.il-c.T--sel{background:var(--ac-md);outline:1px solid var(--ac);outline-offset:-1px}
.il-c.T--rel{outline:1px dotted rgba(154,152,148,.25);outline-offset:-1px}
.il-c.T--dim{opacity:.2}.il-c.T--filter-dim{opacity:.06}
.il-ly.atf .il-c{color:var(--t1)}
.il-ly.norm .il-c{color:var(--t2)}
.il-ly.lemma .il-c{color:var(--t3);font-size:9px}
.il-ly.gloss .il-c{color:var(--t2);font-style:italic;font-family:var(--ui)}
.il-ly.trans .il-c{color:var(--t2);font-family:var(--ui);font-size:10px;padding:3px 7px}
.il-nd{color:var(--t4);font-style:normal}

/* ── SIDEBAR ── */
.sidebar{width:280px;flex-shrink:0;overflow-y:auto;border-left:1px solid var(--bd);background:var(--bg-s)}
.sb-def{padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.sb-def-h{font:500 11px/1.2 var(--ui);color:var(--t2)}
.sb-def-p{font:400 10px/1.6 var(--ui);color:var(--t3)}
.sb-states{display:flex;flex-direction:column;gap:2px}
.sb-sr{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:3px;cursor:pointer;transition:background .1s}
.sb-sr:hover{background:var(--bg-h)}
.sb-sb{font:500 8px/1 var(--mono);color:var(--t3);flex-shrink:0;min-width:22px}
.sb-sd{font:400 9px/1.3 var(--ui);color:var(--t3)}
/* Sidebar filled */
.sb-head{padding:16px 16px 14px;border-bottom:1px solid var(--bd)}
.sb-title{font:500 14px/1.2 var(--mono);color:var(--t1);margin-bottom:3px}
.sb-sub{font:400 10px/1.4 var(--ui);color:var(--t3)}
.sb-norm-chain{font:400 10px/1 var(--mono);color:var(--t2);margin-top:8px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.sb-arr{color:var(--t4)}
/* Sections */
.sb-sec{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.03)}
.sb-sec:last-child{border-bottom:none}
.sb-sec-l{font:600 8px/1 var(--ui);text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:10px}
.sb-row{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.sb-row:last-child{border-bottom:none}
.sb-row-main{font:400 11px/1.4 var(--ui);color:var(--t1)}
.sb-row-main.active{font-weight:500}
.sb-row-sub{font:400 9px/1.3 var(--ui);color:var(--t3);margin-top:2px}
.sb-row-note{font:400 9px/1.3 var(--ui);color:var(--t4);font-style:italic;margin-top:2px}
/* Cross-language */
.sb-xl{display:flex;align-items:center;gap:5px;padding:3px 0}
.sb-xl-d{width:8px;height:3px;border-radius:1px;flex-shrink:0}
.sb-xl-f{font:400 10px/1 var(--mono);color:var(--t2)}
.sb-xl-g{font:400 9px/1 var(--ui);color:var(--t3)}
/* Next step — ONLY element using accent */
.sb-cta{padding:14px 16px;border-top:1px solid var(--bd);background:rgba(201,169,98,.03)}
.sb-cta-l{font:600 8px/1 var(--ui);text-transform:uppercase;letter-spacing:.06em;color:var(--ac);margin-bottom:6px}
.sb-cta-t{font:400 10px/1.5 var(--ui);color:var(--t2)}
.sb-cta-btn{display:inline-block;background:var(--ac);color:var(--bg);border:none;border-radius:3px;padding:5px 12px;font:600 10px/1 var(--ui);cursor:pointer;margin-top:8px;transition:opacity .1s}
.sb-cta-btn:hover{opacity:.85}
/* Pipeline bar */
.sb-pip{display:flex;align-items:center;gap:0;padding:8px 16px;border-top:1px solid rgba(255,255,255,.03)}
.sb-pip-s{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;position:relative}
.sb-pip-s:not(:last-child)::after{content:'';position:absolute;top:3px;left:calc(50% + 5px);width:calc(100% - 10px);height:1px;background:var(--t4)}
.sb-pip-d{width:7px;height:7px;border-radius:50%;border:1px solid var(--t4);background:transparent;z-index:1}
.sb-pip-d.done{background:var(--t2);border-color:var(--t2)}
.sb-pip-d.imp{border:1px dashed var(--t3)}
.sb-pip-d.amb{background:var(--unc);border-color:var(--unc)}
.sb-pip-l{font:500 6px/1 var(--mono);color:var(--t4);text-transform:uppercase}
</style>
</head>
<body>
<div id="app" class="app mode-ribbon depth-reading">
  <header class="toolbar">
    <div class="tb-grp" id="modeG"><button class="tb-btn on" data-m="ribbon">Ribbon</button><button class="tb-btn" data-m="il">Interlinear</button></div>
    <div class="tb-sep"></div>
    <div class="tb-grp" id="depthG"><button class="tb-btn" data-d="atf">ATF</button><button class="tb-btn on" data-d="reading">Reading</button><button class="tb-btn" data-d="full">Full</button></div>
    <select class="tb-sel" id="langSel"><option value="en">English</option><option value="de">Deutsch</option><option value="he">&#x05E2;&#x05D1;&#x05E8;&#x05D9;&#x05EA;</option><option value="fa">&#x0641;&#x0627;&#x0631;&#x0633;&#x06CC;</option></select>
    <div class="tb-sep"></div>
    <div class="pipe-nav" id="pipeNav">
      <span class="pnl">Jump:</span>
      <button class="s-btn" data-j="jnnfr" data-ps="S0">S0</button>
      <button class="s-btn" data-j="mlk_sign" data-ps="S1">S1</button>
      <button class="s-btn" data-j="abaku" data-ps="S1.5">S1.5</button>
      <button class="s-btn" data-j="kiengi" data-ps="S2">S2</button>
      <button class="s-btn" data-j="bel" data-ps="S3">S3</button>
      <button class="s-btn" data-j="lugal" data-ps="S4">S4</button>
    </div>
    <div class="tb-right">
      <div class="mk-legend">
        <span><b class="mk-s d">#</b> damaged</span>
        <span><b class="mk-s u">?</b> uncertain</span>
        <span><b class="mk-s c">!</b> corrected</span>
        <span><b class="mk-s du">!?</b> collated</span>
      </div>
      <div class="tb-sep"></div>
      <label class="tb-toggle"><input type="checkbox" id="hlCk" checked><div class="tb-sw"></div><span class="tb-toggle-l">Link</span></label>
      <label class="tb-toggle"><input type="checkbox" id="mkCk" checked><div class="tb-sw"></div><span class="tb-toggle-l">Markers</span></label>
    </div>
  </header>
  <div class="header-bar">
    <span class="th-name">KUB 99.1 + KBo 50.999</span>
    <span class="chip chip-j">+ join</span>
    <span class="chip">LBA c. 1350</span>

    {num:'3',toks:['nbtawy'],tr:{en:'lord of the two lands',de:'Herr der L\u00e4nder',he:'\u05d0\u05d3\u05d5\u05df \u05d4\u05d0\u05e8\u05e6\u05d5\u05ea',fa:'\u0633\u0631\u0648\u0631 \u062f\u0648 \u0633\u0631\u0632\u0645\u06cc\u0646'}},
    {num:'4',toks:['jnnfr'],tr:{}},
    {num:'5',toks:['anh'],tr:{en:'living forever',de:'lebend ewiglich',he:'\u05d7\u05d9 \u05dc\u05e0\u05e6\u05d7',fa:'\u0632\u0646\u062f\u06af\u06cc \u0627\u0628\u062f\u06cc'}},
    {ruling:true,double:true},
    {num:'6',toks:['htp'],tr:{en:'royal offering formula',de:'Opferformel',he:'\u05e7\u05e8\u05d1\u05df',fa:'\u0646\u0630\u0631\u06cc'}},
    {num:'7',toks:['wsr'],tr:{en:'Ramesses II',de:'Ramses II',he:'\u05e8\u05e2\u05de\u05e1\u05e1 \u05d1',fa:'\u0631\u0627\u0645\u0633\u0633 \u062f\u0648\u0645'}},
  ]},
]},{id:'le',label:'Left Edge',columns:[
  {id:'le-i',num:'vi',lang:'akk',label:'Colophon',lines:[
    {num:'1',toks:['umma','LUGAL'],tr:{en:'Thus the King',de:'So der K\u00f6nig',he:'\u05db\u05d4 \u05d4\u05de\u05dc\u05da',fa:'\u0686\u0646\u06cc\u0646 \u067e\u0627\u062f\u0634\u0627\u0647'}},
    {num:'2',toks:['ina','tuppim'],tr:{en:'on this tablet',de:'auf dieser Tafel',he:'\u05e2\u05dc \u05d4\u05dc\u05d5\u05d7',fa:'\u0628\u0631 \u0631\u0648\u06cc \u0644\u0648\u062d'}},
    {num:'3',toks:['mu','bala','sisa'],tr:{en:'year of righteous reign',de:'Jahr gerechter Regentschaft',he:'\u05e9\u05e0\u05ea \u05de\u05dc\u05db\u05d5\u05ea \u05e6\u05d3\u05e7',fa:'\u0633\u0627\u0644 \u0633\u0644\u0637\u0646\u062a \u0639\u0627\u062f\u0644\u0627\u0646\u0647'}},
  ]},
]}];

/* ── STATE ── */
var aL='en',hlOn=true,selId=null,aSurf='obv',dMode='ribbon',dDepth='reading',fState=null,showMk=true;
var iMap={},tCnt=0;
function pS(p){if(!p)return'S0';if(p.startsWith('S4'))return'S4';if(p.startsWith('S3'))return'S3';if(p.startsWith('S2'))return'S2';if(p.startsWith('S1.5'))return'S1.5';if(p.startsWith('S1'))return'S1';return'S0';}
function hasTr(tr){return tr&&(tr[aL]||tr.en);}

/* ── COMPOSITE NAV ── */
function renderCompNav(){
  return '<div class="comp-nav"><span class="comp-label">Composite Q099999</span>'+
    '<span class="comp-tab ext" title="Previous tablet in sequence">KBo 1.1</span><span class="comp-arr">\u203a</span>'+
    '<span class="comp-tab on">KUB 99.1 + KBo 50.999</span><span class="comp-arr">\u203a</span>'+
    '<span class="comp-tab ext" title="Next tablet in sequence">KUB 99.2</span><span class="comp-arr">\u203a</span>'+
    '<span class="comp-tab ext" title="Related fragment">KBo 50.1001</span></div>';
}

/* ── ATF RAW ── */
function renderATF(col){
  var h='';col.lines.forEach(function(l){
    if(l.ruling){h+='<div class="atf-struct">$ '+(l.double?'double ruling':'single ruling')+'</div>';return;}
    if(l.broken&&!l.toks){h+='<div class="atf-struct">$ '+l.text+'</div>';return;}
    if(l.switch){h+='<div class="atf-struct">% '+l.lang+'</div>';return;}
    var tx=(l.toks||[]).map(function(tid){var t=T[tid];return t?'<span class="'+t.lang+'-hl">'+t.atf+'</span>':'';}).join(' ');
    h+='<div class="atf-ln"><span class="atf-num">'+(l.num||'')+'.</span><span class="atf-txt">'+tx+'</span></div>';
  });return '<div class="atf-raw">'+h+'</div>';
}

/* ── RIBBON TOKEN ── */
function rTok(tid,li,ti,cid){
  var t=T[tid];if(!t)return'';
  var uid='rt-'+cid+'-'+li+'-'+ti;
  if(!iMap[tid])iMap[tid]=[];iMap[tid].push(uid);
  var cert=t.cert||'',dmg=t.damaged?' d':'',brk=t.broken?' b':'';
  var certCls=cert==='#'?'d':cert==='?'?'u':cert==='!'?'c':cert==='!?'?'du':'';
  var mk='';
  if(cert)mk+='<span class="tm '+certCls+'">'+cert+'</span>';
  if(t.det)mk+='<span class="tm det">{'+t.det+'}</span>';
  // Badge for multiple glosses/lemmas or needs-action
  var badge='';var nGls=t.gls?t.gls.length:0;var nPl=t.pl?t.pl.length:0;
  if(nPl>1)badge='<span class="tok-badge needs-action">'+nPl+'</span>';
  else if(nGls>1)badge='<span class="tok-badge">'+nGls+'</span>';
  var norm=t.norm?'<span class="tr-norm">'+t.norm+'</span>':'';
  var lemma=t.lemma?'<span class="tr-lemma">'+t.lemma+'</span>':'';
  var gloss=t.gloss?'<span class="tr-gloss">'+t.gloss+'</span>':'';
  return '<div class="tok '+t.lang+'" id="'+uid+'" data-tid="'+tid+'" data-lemma="'+(t.lemma||'')+'" data-ps="'+pS(t.pipeline)+'" tabindex="0">'+
    badge+
    '<div class="tok-row"><span class="tr-read'+(certCls?' '+certCls:'')+dmg+brk+'">'+t.atf+'</span><span class="tok-markers">'+mk+'</span></div>'+
    (norm?'<div class="tok-row norm-row">'+norm+'</div>':'')+
    (lemma?'<div class="tok-row lemma-row">'+lemma+'</div>':'')+
    (gloss?'<div class="tok-row gloss-row">'+gloss+'</div>':'')+
  '</div>';
}

function rLine(line,li,cid,isLast){
  if(line.ruling)return '<div class="str-r'+(line.double?' double':'')+'"><span class="str-label">'+(line.double?'double ruling':'ruling')+'</span></div>';
  if(line.broken&&!line.toks)return '<div class="str-brk"><div class="str-brk-line"></div><span class="str-brk-label">'+line.text+'</span><div class="str-brk-line"></div></div>';
  if(line.switch)return '<div class="lsep"><div class="lsep-l"></div><span class="lsep-c '+line.lang+'">'+LN[line.lang]+'</span><div class="lsep-l"></div></div>';
  var toks=(line.toks||[]).map(function(tid,ti){return rTok(tid,li,ti,cid)}).join('');
  var tr=line.tr||{};var hasTrans=hasTr(tr);
  var rtl=aL==='he'||aL==='fa';
  var comp=line.composite_ref?'<span class="comp-r">'+line.composite_ref+'</span>':'';
  var trBar=hasTrans?'<div class="tr-bar"><span class="tt"'+(rtl?' dir="rtl"':'')+'>'+(tr[aL]||tr.en)+'</span>'+comp+'</div>':'';
  return '<div class="tb-r" data-row-id="'+cid+'-'+li+'"><div class="rn">'+(line.num||'')+'</div><div class="ribs"><div class="rib-toks">'+toks+'</div>'+trBar+'</div></div>';
}

/* ── INTERLINEAR ── */
function ilTok(tid,layer){
  var t=T[tid];if(!t)return '<span class="il-c"><span class="il-nd"></span></span>';
  var uid='il-'+layer+'-'+tid+'-'+(tCnt++);
  var c='';
  if(layer==='atf')c=t.atf;
  else if(layer==='norm')c=t.norm||'';
  else if(layer==='lemma')c=t.lemma||'';
  else if(layer==='gloss')c=t.gloss||'';
  if(!c)return '<span class="il-c" id="'+uid+'" data-tid="'+tid+'" data-lemma="'+(t.lemma||'')+'" data-ps="'+pS(t.pipeline)+'"><span class="il-nd"></span></span>';
  return '<span class="il-c" id="'+uid+'" data-tid="'+tid+'" data-lemma="'+(t.lemma||'')+'" data-ps="'+pS(t.pipeline)+'">'+c+'</span>';
}
function ilLine(line,cid){
  if(line.ruling)return '<div class="str-r'+(line.double?' double':'')+'"><span class="str-label">'+(line.double?'double ruling':'ruling')+'</span></div>';
  if(line.broken&&!line.toks)return '<div class="str-brk"><div class="str-brk-line"></div><span class="str-brk-label">'+line.text+'</span><div class="str-brk-line"></div></div>';
  if(line.switch)return '<div class="lsep"><div class="lsep-l"></div><span class="lsep-c '+line.lang+'">'+LN[line.lang]+'</span><div class="lsep-l"></div></div>';
  var toks=line.toks||[],layers=['atf','norm','lemma','gloss'];
  var lh=layers.map(function(ly){return '<div class="il-ly '+ly+'"><span class="il-lbl">'+ly+'</span><div class="il-cells">'+toks.map(function(tid){return ilTok(tid,ly)}).join('')+'</div></div>';}).join('');
  var tr=line.tr||{};var rtl=aL==='he'||aL==='fa';
  if(hasTr(tr))lh+='<div class="il-ly trans"><span class="il-lbl">trans</span><div class="il-cells"><span class="il-c"'+(rtl?' dir="rtl"':'')+'>'+(tr[aL]||tr.en)+'</span></div></div>';
  return '<div class="il-row" data-row-id="'+cid+'-il"><div class="il-rn">'+(line.num||'')+'</div><div class="il-blk">'+lh+'</div></div>';
}

function renderCol(col){
  var atf=renderATF(col);
  var lines=col.lines.map(function(l,i){return dMode==='ribbon'?rLine(l,i,col.id,i===col.lines.length-1):ilLine(l,col.id);}).join('');
  return '<div class="col-w"><div class="col-h"><div class="col-lang" style="background:var(--'+col.lang+')"></div><span class="col-n">'+col.label+'</span></div>'+atf+lines+'</div>';
}

function renderSurface(){
  var s=SURFACES.find(function(x){return x.id===aSurf});if(!s)return;
  Object.keys(iMap).forEach(function(k){iMap[k]=[]});tCnt=0;
  document.getElementById('compNav').innerHTML=renderCompNav();
  document.getElementById('colsArea').innerHTML=s.columns.map(renderCol).join('');
  if(fState)applyFilter(fState);
  if(selId)selectToken(selId,null,true);
}

/* ── SIDEBAR ── */
function renderSidebar(tid){
  var t=T[tid];if(!t){document.getElementById('sidebar').innerHTML=renderSBDef();return;}
  var p=pS(t.pipeline),h='';
  h+='<div class="sb-head"><div class="sb-title">'+t.atf+(t.cert?' <span style="color:var(--'+(t.cert==='#'?'dmg':t.cert==='?'?'unc':'corr')+')">'+t.cert+'</span>':'')+'</div>';
  h+='<div class="sb-sub">'+LN[t.lang]+(t.lemma?' \u00b7 '+t.lemma:'')+(t.src?' \u00b7 '+t.src:'')+'</div>';
  if(t.norm_chain){var parts=t.norm_chain.split('\u2192');h+='<div class="sb-norm-chain">'+parts.map(function(p,i){return (i?'<span class="sb-arr">\u2192</span>':'')+p.trim()}).join('')+'</div>';}
  h+='</div>';
  if((p==='S1.5'||p==='S3')&&t.pl){
    h+='<div class="sb-sec"><div class="sb-sec-l">'+(p==='S3'?'Disambiguation':'Candidates')+'</div>';
    t.pl.forEach(function(l){
      h+='<div class="sb-row"><div class="sb-row-main'+(l.p?' active':'')+'">'+l.f+'</div><div class="sb-row-sub">'+l.g+(l.a?' \u00b7 '+l.a.toLocaleString()+' att.':'')+'</div>';
      if(l.note)h+='<div class="sb-row-note">'+l.note+'</div>';
      h+='</div>';
    });h+='</div>';
  }
  if(t.gls&&t.gls.length&&(p==='S2'||p==='S4')){
    h+='<div class="sb-sec"><div class="sb-sec-l">Glosses'+(t.gls.length>1?' ('+t.gls.length+')':'')+'</div>';
    t.gls.forEach(function(g){h+='<div class="sb-row"><div class="sb-row-main'+(g.p?' active':'')+'">'+g.t+'</div></div>';});
    h+='</div>';
  }
  if(p==='S4'&&t.sp&&t.sp.length){
    h+='<div class="sb-sec"><div class="sb-sec-l">Spellings</div>';
    t.sp.forEach(function(s){h+='<div class="sb-row"><div class="sb-row-sub" style="font-family:var(--mono)">'+s+'</div></div>';});
    h+='</div>';
  }
  if(t.xl&&t.xl.length){
    h+='<div class="sb-sec"><div class="sb-sec-l">Cross-Language</div>';
    t.xl.forEach(function(x){h+='<div class="sb-xl"><div class="sb-xl-d" style="background:var(--'+x.l+')"></div><span class="sb-xl-f">'+x.f+'</span><span class="sb-xl-g">'+x.g+'</span></div>';});
    h+='</div>';
  }
  if(t.ctx){var c=t.ctx;h+='<div class="sb-sec"><div class="sb-sec-l">Context</div><div class="sb-row-sub">'+(c.period||'')+' \u00b7 '+(c.genre||'')+' \u00b7 '+(c.prov||'')+(c.uses?' \u00b7 '+c.uses+'\u00d7':'')+'</div></div>';}
  if(t.ns||p==='S0'||p==='S1'||p==='S1.5'||p==='S2'||p==='S3'){
    var ns=t.ns||'Refine and verify.';
    var btn=p==='S0'?'Search corpus':p==='S1'?'Add normalization':p==='S1.5'?'Select lemma':p==='S3'?'Disambiguate':'Confirm';
    h+='<div class="sb-cta"><div class="sb-cta-l">Next Step</div><div class="sb-cta-t">'+ns+'</div><button class="sb-cta-btn">'+btn+'</button></div>';
  }
  var hasSign=!!t.sign,hasNorm=!!t.norm,hasLemma=!!t.lemma,hasGloss=!!t.gloss,isAmb=p==='S3',isImp=t.lang==='sux'&&!t.norm_chain;
  var steps=[{l:'Sign',c:hasSign?'done':''},{l:'Read',c:'done'},{l:'Norm',c:hasNorm?'done':(isImp?'imp':(p==='S1.5'?'done':''))},{l:'Lemma',c:hasLemma?'done':(isAmb?'amb':'')},{l:'Gloss',c:hasGloss?'done':''}];
  h+='<div class="sb-pip">'+steps.map(function(s){return '<div class="sb-pip-s"><div class="sb-pip-d '+s.c+'"></div><span class="sb-pip-l">'+s.l+'</span></div>';}).join('')+'</div>';
  document.getElementById('sidebar').innerHTML=h;
}
function renderSBDef(){
  return '<div class="sb-def"><div class="sb-def-h">Select a token</div><div class="sb-def-p">Click any token to inspect. Click again to deselect. Use S0\u2013S4 buttons to jump. Shift+click to filter.</div>'+
    '<div class="sb-states">'+
    [['S0','jnnfr','No data (Egyptian)'],['S1','mlk_sign','Sign matched (Ugaritic)'],['S1','ibtasa','Norm only (Hittite)'],['S1.5','abaku','Norm candidates (Akkadian)'],['S1.5','karan','3 candidates (Elamite)'],['S2','kiengi','Lemmatized (Sumerian)'],['S2','sarrim','Norm chain (Akkadian)'],['S2','lu2','With glosses (Sumerian)'],['S3','bel','Ambiguous (Akkadian)'],['S3','ursag','Ambiguous (Hittite)'],['S4','lugal','Complete (Sumerian)'],['S4','tuppim','Complete + norm (Akkadian)']].map(function(r){
      return '<div class="sb-sr" data-j="'+r[1]+'"><span class="sb-sb">'+r[0]+'</span><span class="sb-sd">'+r[2]+'</span></div>';}).join('')+'</div></div>';
}

/* ── EVENTS ── */
function clearSel(){
  document.querySelectorAll('.T--sel,.T--rel,.T--dim,.row--sel').forEach(function(el){el.classList.remove('T--sel','T--rel','T--dim','row--sel')});
  selId=null;document.getElementById('sidebar').innerHTML=renderSBDef();
}
function selectToken(tid,domId,silent){
  if(tid===selId&&!silent){clearSel();return;}
  document.querySelectorAll('.T--sel,.T--rel,.T--dim,.row--sel').forEach(function(el){el.classList.remove('T--sel','T--rel','T--dim','row--sel')});
  selId=tid;var t=T[tid];if(!t)return;
  var lemma=t.lemma||'';
  // Highlight selected token only; related tokens get subtle treatment
  document.querySelectorAll('[data-tid="'+tid+'"]').forEach(function(el){el.classList.add('T--sel');
    // Highlight containing row
    var row=el.closest('.tb-r,.il-row');if(row)row.classList.add('row--sel');
  });
  if(hlOn&&lemma){
    document.querySelectorAll('[data-lemma]').forEach(function(el){
      if(el.dataset.tid===tid)return;// already handled
      if(el.dataset.lemma&&el.dataset.lemma===lemma)el.classList.add('T--rel');
    });
  }
  if(!silent)renderSidebar(tid);
}
function jumpToToken(tid){
  var ids=iMap[tid];
  if(!ids||!ids.length){
    for(var si=0;si<SURFACES.length;si++){var s=SURFACES[si];for(var ci=0;ci<s.columns.length;ci++){for(var li=0;li<s.columns[ci].lines.length;li++){var l=s.columns[ci].lines[li];if(l.toks&&l.toks.indexOf(tid)>=0){setASurf(s.id);setTimeout(function(){jumpToToken(tid)},60);return;}}}}return;
  }
  var el=document.getElementById(ids[0]);if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
  setTimeout(function(){selectToken(tid,ids[0])},300);
}
function applyFilter(p){fState=p;
  document.querySelectorAll('.T--filter-dim').forEach(function(el){el.classList.remove('T--filter-dim')});
  if(!p){document.querySelectorAll('.s-btn').forEach(function(b){b.classList.remove('filtered')});return;}
  document.querySelectorAll('.s-btn').forEach(function(b){b.classList.toggle('filtered',b.dataset.ps===p)});
  document.querySelectorAll('[data-ps]').forEach(function(el){if(el.classList.contains('s-btn'))return;if(el.dataset.ps!==p)el.classList.add('T--filter-dim');});
}
function setMode(m){dMode=m;document.getElementById('app').classList.toggle('mode-ribbon',m==='ribbon');document.getElementById('app').classList.toggle('mode-il',m==='il');document.querySelectorAll('[data-m]').forEach(function(b){b.classList.toggle('on',b.dataset.m===m)});renderSurface();}
function setDepth(d){dDepth=d;var a=document.getElementById('app');['depth-atf','depth-reading','depth-full'].forEach(function(c){a.classList.remove(c)});a.classList.add('depth-'+d);document.querySelectorAll('[data-d]').forEach(function(b){b.classList.toggle('on',b.dataset.d===d)});}
function setLang(l){aL=l;renderSurface();}
function setASurf(id){aSurf=id;document.querySelectorAll('[data-surf]').forEach(function(s){s.classList.toggle('on',s.dataset.surf===id)});clearSel();renderSurface();}

function init(){
  renderSurface();document.getElementById('sidebar').innerHTML=renderSBDef();
  document.getElementById('modeG').addEventListener('click',function(e){var b=e.target.closest('[data-m]');if(b)setMode(b.dataset.m)});
  document.getElementById('depthG').addEventListener('click',function(e){var b=e.target.closest('[data-d]');if(b)setDepth(b.dataset.d)});
  document.getElementById('langSel').addEventListener('change',function(e){setLang(e.target.value)});
  document.getElementById('hlCk').addEventListener('change',function(e){hlOn=e.target.checked;if(selId){selectToken(selId,null,false);}else{document.querySelectorAll('.T--rel,.T--dim').forEach(function(el){el.classList.remove('T--rel','T--dim')})}});
  document.getElementById('mkCk').addEventListener('change',function(e){showMk=e.target.checked;document.getElementById('app').classList.toggle('hide-markers',!showMk);renderSurface()});
  document.getElementById('colsArea').addEventListener('click',function(e){
    var tok=e.target.closest('.tok');if(tok){selectToken(tok.dataset.tid,tok.id);return;}
    var c=e.target.closest('.il-c');if(c&&c.dataset.tid){selectToken(c.dataset.tid,c.id);return;}
  });
  document.getElementById('pipeNav').addEventListener('click',function(e){var b=e.target.closest('[data-j]');if(!b)return;if(e.shiftKey){var p=b.dataset.ps;applyFilter(fState===p?null:p);}else jumpToToken(b.dataset.j);});
  document.querySelector('.header-bar').addEventListener('click',function(e){var t=e.target.closest('[data-surf]');if(t)setASurf(t.dataset.surf)});
  document.getElementById('sidebar').addEventListener('click',function(e){var r=e.target.closest('[data-j]');if(r)jumpToToken(r.dataset.j)});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSel();fState=null;applyFilter(null);}});
}
window.addEventListener('DOMContentLoaded',init);
</script>
