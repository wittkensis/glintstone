{% extends "base.html" %}

{% block title %}Something went wrong — Glintstone{% endblock %}

{% block content %}
<main class="error-page">
    <div class="error-page__inner">
        <span class="error-page__glyph" aria-hidden="true">𒁹</span>
        <h1 class="error-page__code">500</h1>
        <p class="error-page__title">Something went wrong</p>
        <p class="error-page__message">
            An unexpected error occurred on our end.
            Please try again, or return to the homepage.
        </p>
        <div class="error-page__actions">
            <a href="/" class="btn btn--primary btn--lg">Go to homepage</a>
        </div>
    </div>
</main>
{% endblock %}
