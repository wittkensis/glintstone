# staging.glintstone.org + staging-api.glintstone.org — combined vhost.
#
# TLS material comes from the staging.glintstone.org cert (covers staging
# and staging-api). /static/ follows the `current/` release symlink (issue
# #83 Phase 1c).

server {
    listen 80;
    server_name staging.glintstone.org;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name staging-api.glintstone.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/staging.glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/glintstone-staging/current/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl;
    server_name staging-api.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/staging.glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
