# assets.glintstone.org — branded R2 image proxy.
#
# Hostinger DNS holds the apex zone. Pointing a CDN custom domain at R2
# requires moving nameservers to Cloudflare; we deferred that, so this
# vhost stands in as a branded wrapper around the R2 dev URL.
#
# nginx caches each image on disk for 30 days. After the first hit the bucket
# never gets touched, which sidesteps the r2.dev rate limit at any plausible
# scale. R2 egress is free; the only cost is VPS bandwidth.
#
# Shared cert: the glintstone.org Let's Encrypt cert is reissued with
# assets.glintstone.org in the SAN after first deploy. See issue #65.

# proxy_cache_path must live in the http context. Lives here rather than in
# 00-shared.conf because no other vhost needs this zone.
proxy_cache_path /var/cache/nginx/r2
                 levels=1:2
                 keys_zone=glintstone_r2:50m
                 max_size=10g
                 inactive=30d
                 use_temp_path=off;

server {
    listen 80;
    server_name assets.glintstone.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name assets.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/http.d/snippets/security-headers.conf;

    # Reverse-proxy + cache the public R2 dev URL. When DNS is eventually moved
    # to Cloudflare and R2 gets a real custom domain, replace proxy_pass with
    # the new origin (or rip this vhost out entirely) — no app code changes.
    location / {
        limit_req zone=glintstone_assets burst=200 nodelay;

        proxy_pass https://pub-d64e8774cbf24117bc24b11224ea66bc.r2.dev;
        proxy_set_header Host pub-d64e8774cbf24117bc24b11224ea66bc.r2.dev;
        proxy_ssl_server_name on;

        proxy_cache glintstone_r2;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;

        add_header X-Cache-Status $upstream_cache_status always;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
