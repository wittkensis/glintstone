server {
    listen 80;
    server_name glintstone.org www.glintstone.org;
    return 301 https://glintstone.org$request_uri;
}

server {
    listen 443 ssl;
    server_name glintstone.org www.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/glintstone/shared/www;
    index index.html;

    location /docs/ {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    if ($host = www.glintstone.org) {
        return 301 https://glintstone.org$request_uri;
    }
}
