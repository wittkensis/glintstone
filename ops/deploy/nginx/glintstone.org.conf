server {
    listen 80;
    server_name glintstone.org www.glintstone.org;
    root /var/www/glintstone/marketing;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Redirect www to apex
    if ($host = www.glintstone.org) {
        return 301 https://glintstone.org$request_uri;
    }
}
