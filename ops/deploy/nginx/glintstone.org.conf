server {
    listen 80;
    server_name glintstone.org www.glintstone.org;
    return 301 https://glintstone.org$request_uri;
}

# Dedicated www → apex redirect on TLS. Cleaner than the `if ($host = www…)`
# anti-pattern that previously lived inside the apex server block.
server {
    listen 443 ssl;
    server_name www.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/http.d/snippets/security-headers.conf;

    return 301 https://glintstone.org$request_uri;
}

server {
    listen 443 ssl;
    server_name glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/http.d/snippets/security-headers.conf;

    root /var/www/glintstone/shared/www;
    index index.html;

    location /docs/ {
        limit_req zone=glintstone_assets burst=200 nodelay;
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        limit_req zone=glintstone_app burst=80 nodelay;
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        limit_req zone=glintstone_assets burst=200 nodelay;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
