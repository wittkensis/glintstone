# mcp.glintstone.org — Glintstone MCP HTTP/SSE server (uvicorn on 127.0.0.1:8005).
#
# Shares the glintstone.org multi-domain Let's Encrypt cert (SAN includes mcp).
# The mcp service itself ships with `autostart=false` in supervisor until
# `mcp.server_http` is implemented — this vhost is in place so the cert + DNS
# can be validated ahead of that work.

server {
    listen 80;
    server_name mcp.glintstone.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mcp.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires unbuffered streaming — nginx buffers by default.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }
}
