# api.glintstone.org — Glintstone REST API (uvicorn on 127.0.0.1:8001).
#
# Shares the glintstone.org multi-domain Let's Encrypt cert (see app.glintstone.org.conf).

server {
    listen 80;
    server_name api.glintstone.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
