# Security headers — include into every HTTPS server block.
#
# `always` ensures the header is set on error responses too (4xx/5xx), which
# default add_header skips. See issue #52.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;

# Content-Security-Policy — primary browser-side XSS defense (audit 2026-06-07 §2b).
# 'unsafe-inline' is retained on script-src/style-src because the templates still
# carry inline <script>, inline event handlers (onclick/onchange), and style=""
# attributes; tightening to nonces is a tracked follow-up. Even so this meaningfully
# locks down default-src, img-src, connect-src and frame-ancestors.
#   img-src:     self + asset CDN + CDLI photo/lineart hosts + data: (inline thumbs)
#   connect-src: self + the API origin the SPA fetches from
#   font-src:    self + Google Fonts file host; style-src adds the Google Fonts CSS host
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://assets.glintstone.org https://cdli.earth https://cdli.ucla.edu; connect-src 'self' https://api.glintstone.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
