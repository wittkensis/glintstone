# app.glintstone.org — Glintstone web app (uvicorn on 127.0.0.1:8002).
#
# TLS material comes from the multi-domain Let's Encrypt cert issued for
# glintstone.org (covers glintstone.org, www, api, app). If the cert ever
# gets reissued with different SANs, audit this file plus api.glintstone.org.conf.
#
# /static/ follows the `current/` release symlink rather than pointing at the
# unversioned $APP_DIR — see issue #83 Phase 1c.

server {
    listen 80;
    server_name app.glintstone.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.glintstone.org;

    ssl_certificate /etc/letsencrypt/live/glintstone.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glintstone.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/glintstone/current/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
