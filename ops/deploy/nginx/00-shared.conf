# Shared http-context directives for Glintstone — applies to all vhosts.
#
# Lives in /etc/nginx/http.d/ alongside the per-vhost configs; nginx loads it
# inside the http {} block automatically. Filename starts with `00-` so it
# parses first (the rate-limit zones must exist before any `limit_req` refers
# to them).
#
# See issue #52.

# --- Rate limit zones ------------------------------------------------------
#
# Internal/loopback traffic is exempted (empty key disables limiting) so the
# web app's hairpin calls to api.glintstone.org don't drain the API zone.
geo $glintstone_limit_key {
    default        $binary_remote_addr;
    127.0.0.1      "";
    ::1            "";
}

# Public API surface — search, /artifacts, /agent — moderate cap, generous burst.
limit_req_zone $glintstone_limit_key zone=glintstone_api:10m rate=200r/m;

# Web app — page renders fan out into 5-10 backend calls per pageview, so the
# zone seen here is "browser → app" only and can run hotter.
limit_req_zone $glintstone_limit_key zone=glintstone_app:10m rate=300r/m;

# Static asset zone (R2-fronted assets, /static/) — cheap, very high cap.
limit_req_zone $glintstone_limit_key zone=glintstone_assets:5m rate=600r/m;

# Hitting the limit returns 429, not 503 — gives clients a clear signal.
limit_req_status 429;
