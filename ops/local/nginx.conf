# Glintstone v2 — Local development nginx config (template)
#
# __PROJECT_DIR__ is substituted at startup by ops/local/start.sh — do not edit
# the placeholder by hand. The generated config is written to a temp file and
# passed to nginx via `-c`.

worker_processes 1;
error_log /dev/null;
pid /tmp/glintstone-nginx.pid;

events { worker_connections 64; }

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;

    # API — api.glintstone.test -> uvicorn :8001
    server {
        listen 80;
        server_name api.glintstone.test;

        location / {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Web App — app.glintstone.test -> uvicorn :8002
    server {
        listen 80;
        server_name app.glintstone.test;

        location / {
            proxy_pass http://127.0.0.1:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias "__PROJECT_DIR__/app/static/";
            expires off;
        }
    }

    # www/ — glintstone.test -> static files served from the repo's www/ dir
    server {
        listen 80;
        server_name glintstone.test;
        root "__PROJECT_DIR__/www";
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
