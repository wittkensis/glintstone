# Pre-commit framework configuration
# See https://pre-commit.com for more information
#
# Philosophy: hooks are a fast local catch, not a CI replay.
# mypy and full lint run in CI (test.yml). Hooks do ruff auto-fix,
# lightweight doc warnings, and a schema guard on push.

repos:
  - repo: local
    hooks:
      - id: check-root-layout
        name: Repo Root Layout Guard
        entry: ops/scripts/check-root-layout.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: documentation-validation
        name: Documentation Validation
        entry: ops/hooks/pre-commit-docs.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]

      - id: schema-validation
        name: Database Schema Validation
        entry: ops/hooks/pre-push.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

      - id: dependency-warnings
        name: Dependency Sync Warnings
        entry: ops/hooks/post-merge.sh
        language: script
        pass_filenames: false
        stages: [post-merge]

  # Ruff — fast lint + format, commit only (CI handles push).
  # Pin matches the CI install in .github/workflows/test.yml so local
  # auto-fixes don't drift from the gate.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        args: ['--unsafe']
        stages: [pre-commit]
      - id: check-added-large-files
        args: ['--maxkb=1000']
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
